# =============================================================================
# 评分校正配置
# =============================================================================
scoring_correction:
  # 启用/禁用行业校正
  enabled: true
  
  # 校正强度（0=不校正，1=完全校正）
  correction_strength: 1.0
  
  # 各评分维度的行业校正权重
  # 说明：哪些维度需要行业校正，以及校正权重
  dimension_weights:
    layer_5_financial: 0.35     # 财报质量评分中35%的权重受行业基准影响
    layer_6_valuation: 1.00    # 估值约束评分100%需要行业校正（核心）
    layer_0_correction: 0.50   # Layer 0修正中50%受行业生命周期影响
  
  # 偏离系数计算参数
  deviation_calculation:
    # 偏离度 = (实际值 - 行业基准中值) / 行业基准中值
    # 偏离系数 = 偏离度 × 敏感度系数
    
    metric_sensitivity:
      roic: 1.0
      gross_margin: 0.8
      pe_ttm: 1.2         # PE偏离最敏感
      ps_ttm: 1.0
      revenue_growth: 0.9
      net_margin: 0.8
      inventory_days: 0.6   # 存货周转偏离最不敏感
    
    # 偏离系数上限/下限（防止过度校正）
    max_deviation_coefficient: 0.30   # 最高+30%
    min_deviation_coefficient: -0.25   # 最低-25%
  
  # 缺失行业基准时的处理
  fallback_behavior:
    use_generic_benchmarks: true
    missing_flag: "🟡"   # 标注缺失
    missing_penalty: 0.02  # 缺失行业基准时，额外-2%（鼓励补充基准数据）

# =============================================================================
# 校正公式说明（供开发者参考）
# =============================================================================
# 
# 【核心公式】
# 校正后评分 = 原始评分 × (1 + 行业偏离系数)
# 
# 【行业偏离系数计算】
# 1. 对每个指标计算偏离度：
#    deviation = (actual_value - benchmark_mid) / benchmark_mid
# 
# 2. 计算加权偏离系数：
#    industry_deviation = Σ(deviation_i × sensitivity_i × weight_i)
# 
# 3. 裁剪到合理区间：
#    industry_deviation = clip(industry_deviation, -0.25, +0.30)
# 
# 【分维度校正细则】
# 
# Layer 6 估值约束（核心校正目标）：
#   - 原逻辑：PE>200扣8分，100-200扣5分，50-100扣2分
#   - 校正后：使用行业基准PE区间作为扣分基准
#     例：光模块成长期PE基准20-80x，中际旭创PE 75x → 不扣分（在区间内）
#     例：PCB成熟期PE基准10-20x，某PCB公司PE 50x → 按偏离度扣分
# 
# Layer 5 财报质量：
#   - 营收增速评分：使用行业营收增速基准
#     例：光模块增速基准30-150%，某公司增速50% → 正常（满分）
#     例：PCB增速基准5-15%，某公司增速50% → 超预期（加分）
#   - ROE评分：使用行业ROIC基准
#   - 毛利率评分：使用行业毛利率基准
# 
# Layer 0 前置修正：
#   - 行业生命周期自动匹配，无需人工判断
#     例：光模块→成长期中期（修正+1）
#     例：PCB→成熟期→成长期过渡（修正0）
#     例：存储器→根据周期阶段动态修正
# 
# 【示例】
# 光库科技（300620.SZ）- 光模块行业（成长期）
#   - 原评分：68分（Layer 6估值扣18分导致）
#   - 行业校正：
#     * PE 281x vs 行业基准20-80x → 偏离度=281/50-1=4.62 → 裁剪到+0.30
#     * PS 40x vs 行业基准5-15x → 偏离度=40/10-1=3.00 → 裁剪到+0.30
#     * 综合偏离系数 ≈ +0.25（估值显著高于行业）
#   - 校正后评分：68 × (1 + 0.25) = 85 → 裁剪到原始评分上限？
#     → 实际：Layer 6扣分减少（因为用行业基准重新计算），总分提升至75-78
#
# 中际旭创（300308.SZ）- 光模块行业（成长期）
#   - PE 76x vs 行业基准20-80x → 在区间内 → 不扣分
#   - PS 12x vs 行业基准5-15x → 在区间内 → 不扣分
#   - 原Layer 6扣分从10分降至2分 → 总分从72提升至80+
# 
# =============================================================================