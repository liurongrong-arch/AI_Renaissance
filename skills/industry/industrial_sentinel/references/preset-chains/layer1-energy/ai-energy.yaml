chain_name: ai-energy
industry_name: AI能源层
source: 黄仁勋AI五层蛋糕结构投研报告
industry_name_en: AI Energy Infrastructure
tags: [AI, 能源, 电力, 液冷, 数据中心, 核电, 电网]

upstream:
  nodes:
    - name: 发电/基荷电源
      key_players: ["CEG(Constellation)", "VST", "阳光电源", "中国广核", "中国核电"]
      key_metrics:
        - 核电/火电/可再生能源发电容量
        - 小型模块化反应堆(SMR)进展
        - 电力直供合约签订量
      price_benchmark: "核电直供合约溢价15-20%"
      shortage_indicator: "美国数据中心电力缺口47GW"
      profit_pool: "发电利润池 20-30%"
      barrier: "审批周期长+资本密集：核电需NRC审批，SMR商业化2028+"
      bargain_power: "强 — 电力是刚需，微软已签1.6GW核电直供"
    - name: 铜/铝/稀土原材料
      key_players: ["紫金矿业", "中国铝业", "北方稀土"]
      key_metrics:
        - 铜价(LME)
        - 铝价
        - 稀土磁材价格
      price_benchmark: "铜价2026年高位震荡，电网用铜需求激增"
      shortage_indicator: "铜精矿供应偏紧"
      profit_pool: "原材料利润池 5-8%"
      barrier: "资源禀赋壁垒"
      bargain_power: "中等 — 周期性定价"
    - name: 电力电子器件(IGBT/SiC)
      key_players: ["英飞凌", "斯达半导", "时代电气", "士兰微"]
      key_metrics:
        - IGBT/SiC模块价格
        - 新能源车+电网+光伏需求
        - 国产化率
      price_benchmark: "SiC模块价格年降10-15%，IGBT供应紧张"
      shortage_indicator: "高端IGBT仍依赖进口"
      profit_pool: "功率器件利润池 8-12%"
      barrier: "技术壁垒高，认证周期长"
      bargain_power: "中等 — 国产替代进行中"
    - name: 温控/液冷上游
      key_players: ["三花智控", "英维克(材料供应商)"]
      key_metrics:
        - 冷却液价格
        - 热交换器产能
        - 液冷渗透率(%)
      profit_pool: "温控材料利润池 10-15%"
      barrier: "材料配方+可靠性验证：冷却液需长期稳定性测试"
      bargain_power: "中等 — 材料供应商分散，但认证周期长"

midstream:
  nodes:
    - name: 输变电设备
      key_players: ["思源电气", "中国西电", "平高电气", "许继电气", "ETN(Eaton)"]
      key_metrics:
        - 特高压招标量
        - 变压器/开关设备出货量
        - 海外订单占比
      price_benchmark: "变压器交付周期拉长至100周+，中国占全球60%产能"
      shortage_indicator: "美国变压器交付周期100周+，紧缺严重"
      profit_pool: "输变电利润池 15-20%"
      barrier: "认证+交付周期：变压器需UL认证，产能扩张慢"
      bargain_power: "极强 — 交付周期100周+，买方无议价权"
    - name: 配电设备/智能电网
      key_players: ["国电南瑞", "东方电子", "四方股份", "施耐德"]
      key_metrics:
        - 配电自动化招标
        - 智能电表出货量
        - 电网数字化投资
      price_benchmark: "配电设备需求随数据中心扩容爆发"
      profit_pool: "配电设备利润池 10-15%"
      barrier: "可靠性要求：数据中心不能断电，品牌信任度高"
      bargain_power: "中等 — 品牌集中，但标准化程度高"
    - name: 液冷系统
      key_players: ["英维克", "Vertiv(VRT)", "CoolIT", "高澜股份", "同飞股份"]
      key_metrics:
        - 液冷系统出货量
        - 浸没式/冷板式占比
        - CDU(冷却分配单元)产能
      price_benchmark: "液冷系统单价从$50k向$100k+升级"
      profit_pool: "液冷系统利润池 20-25%"
      barrier: "系统集成+可靠性：需与服务器厂商联合设计"
      bargain_power: "强 — 液冷从可选项变生死线，供应商集中"
    - name: 电源/UPS/PDU
      key_players: ["维谛技术", "科华数据", "科士达", "Eaton"]
      key_metrics:
        - 数据中心UPS出货量
        - 高压直流电源渗透率
        - 功率密度提升
      price_benchmark: "AI数据中心电源功率密度翻倍需求"
      profit_pool: "电源设备利润池 10-15%"
      barrier: "可靠性要求极高"
      bargain_power: "中等 — 品牌集中"
    - name: 能源管理
      key_players: ["施耐德EcoStruxure", "华为数字能源"]
      key_metrics:
        - PUE能效比
        - 能源管理系统部署量
        - AI驱动能源优化案例
      profit_pool: "软件/服务利润池 5-10%"
      barrier: "算法+场景know-how：需深度理解数据中心负载特征"
      bargain_power: "弱 — 软件容易被自研替代"

downstream:
  nodes:
    - name: 超大规模数据中心
      key_players: ["微软", "谷歌", "亚马逊", "Meta"]
      key_metrics:
        - 年度Capex
        - 数据中心开工数量
        - 电力获取进度
      capex_benchmark: "四大巨头2026年CAPEX合计$6500亿+"
      profit_pool: "云厂商利润池 25-35%"
      barrier: "资本+土地+电力：三重资源壁垒"
      bargain_power: "对上游弱(电力紧缺)、对中游强(集中采购)"
    - name: 第三方数据中心
      key_players: ["Equinix", "Digital Realty", "万国数据", "润泽科技", "光环新网"]
      key_metrics:
        - IDC市场规模
        - 上架率(%)
        - 机柜价格(元/kW/月)
      profit_pool: "IDC运营利润池 15-20%"
      barrier: "一线城市能耗指标：政府审批限制"
      bargain_power: "中等 — 供需紧张，议价权提升"
    - name: 电网运营商
      key_players: ["国家电网", "南方电网", "美国各大电力公司"]
      key_metrics:
        - 电网投资计划
        - 输配电容量扩建
        - 新能源并网容量
      demand_indicator: "AI数据中心用电2030年达945太瓦时"
      profit_pool: "电网运营利润池 10-15%"
      barrier: "牌照+网络效应"
      bargain_power: "强 — 垄断性行业"
    - name: 算力租赁/云服务
      key_players: ["协创数据", "CoreWeave", "Lambda Labs"]
      key_metrics:
        - GPU租赁价格($/小时)
        - 算力利用率(%)
        - 客户续约率
      profit_pool: "算力租赁利润池 10-15%"
      barrier: "GPU获取能力+客户信任：需长期GPU供应协议"
      bargain_power: "弱 — 受上游GPU价格和电力成本双重挤压"

value_allocation:
  upstream_share: "25-30%"
  midstream_share: "35-40%"
  downstream_share: "30-40%"
  bargain_power: "中游设备商议价权随紧缺加剧而增强；下游云厂商集中度高但对能源环节议价权弱"

life_cycle:
  stage: 成长期
  penetration_range: "15-35%"
  growth_driver: "AI算力电力需求爆发 + 全球电网升级 + 液冷渗透率提升 + 核电/SMR重启"
  risk_factor: "电网建设周期长（3-5年），可能滞后于AI需求增速；政策审批不确定性"

signal_weights:
  barometric: 1.2
  mid_axis: 1.1
  ebb_warning: 0.8

key_catalysts:
  - "微软/谷歌/亚马逊签订核电直供大单"
  - "SMR（小型模块化反应堆）获得监管审批"
  - "液冷渗透率达45%+（2026目标）"
  - "特高压/电网设备招标超预期"
  - "数据中心PUE降至1.2以下"

preset_indicators:
  barometric:
    - indicator: 变压器交付周期
      unit: 周
      trigger: 延长至80周+
      current: "100周+（美国）"
      source: "产业调研"
    - indicator: 液冷渗透率
      unit: '%'
      trigger: 季度环比提升≥3pp
      current: "31%→45%（2026目标）"
      source: "行业研报"
    - indicator: 铜价
      unit: USD/吨
      trigger: 连续2月环比上涨≥5%
      current: "高位震荡"
      source: "LME"
    - indicator: 核电直供合约量
      unit: GW
      trigger: 新增签约≥1GW
      current: "微软1.6GW（Constellation）"
      source: "公司公告"
    - indicator: 数据中心用电量增速
      unit: '%'
      trigger: 同比≥+30%
      current: "全球+25-30%"
      source: "IEA"

  mid_axis:
    - indicator: 电力设备厂商订单增速
      unit: '%'
      trigger: 同比增长≥25%
      current: "头部+30-40%"
      source: "财报数据"
    - indicator: 液冷系统出货量
      unit: MW
      trigger: 季度环比≥+20%
      current: "高速增长"
      source: "产业调研"
    - indicator: 海外订单占比
      unit: '%'
      trigger: 提升至30%+
      current: "15-25%"
      source: "财报数据"
    - indicator: 电网数字化投资
      unit: 亿元
      trigger: 年度投资≥1000亿
      current: "国网数字化投资持续增长"
      source: "电网公告"
    - indicator: 电源设备毛利率
      unit: '%'
      trigger: 环比提升≥1pp
      current: "稳中有升"
      source: "财报数据"

  ebb_warning:
    - indicator: 全球数据中心CapEx增速
      unit: '%'
      trigger: 从+35%降至≤+10%
      current: "仍+35%"
      source: "行业预测"
    - indicator: 电网投资完成率
      unit: '%'
      trigger: 年度完成率≤80%
      current: "正常"
      source: "电网公告"
    - indicator: 液冷技术替代风险
      unit: 等级
      trigger: 新冷却技术（如浸没式）颠覆
      current: "冷板式为主"
      source: "技术跟踪"
    - indicator: 新能源消纳率
      unit: '%'
      trigger: 弃风弃光率回升
      current: "可控"
      source: "能源局"

preset_companies:
  - code: "002028.SZ"
    name: 思源电气
    position: "中游输变电设备"
    logic: "电力设备出海龙头，变压器/开关设备核心供应商"
  - code: "300499.SZ"
    name: 高澜股份
    position: "中游液冷系统"
    logic: "液冷解决方案提供商，数据中心液冷核心标的"
  - code: "002837.SZ"
    name: 英维克
    position: "中游温控/液冷"
    logic: "温控龙头，全场景液冷方案，数据中心渗透率提升"
  - code: "002335.SZ"
    name: 科华数据
    position: "中游电源/UPS"
    logic: "数据中心UPS+储能双轮驱动"
  - code: "600875.SH"
    name: 东方电气
    position: "上游发电设备"
    logic: "发电设备平台型公司，核电/水电/火电全覆盖"

cross_verify:
  upstream: ["600362.SH", "601899.SH"]  # 江西铜业/紫金矿业
  midstream: ["002028.SZ", "002837.SZ"]  # 思源电气/英维克
  downstream: ["300442.SZ"]  # 润泽科技
  external_indicators:
    - name: "全球数据中心用电量"
      metric: "415太瓦时(2024)→945太瓦时(2030)"
      source: "IEA预测"
    - name: "北美电力缺口"
      metric: "47GW(2025-2028)"
      source: "摩根士丹利"

investment_thesis: |
  电力是AI发展的第一瓶颈，能源层是确定性最高的"卖水人"。
  核心矛盾：AI算力需求指数级增长 vs 电力供给线性扩张的错配。
  三层机会：
  1. 发电端：SMR核电是终极基荷电源，但商业化周期长
  2. 电网端：变压器/配电设备全球紧缺，交付周期100周+
  3. 温控端：液冷从可选项变生死线，渗透率快速提升
  时间轴：2026-2027年电力设备紧缺 → 2028-2030年SMR核电逐步上线
  投资特性：底层确定性最高，旱涝保收，但增速相对平稳。
