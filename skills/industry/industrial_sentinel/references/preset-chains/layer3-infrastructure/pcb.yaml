chain_name: pcb-ccl
industry_name: PCB/覆铜板
tags: [PCB, 覆铜板, 电子布, AI服务器, 消费电子]

upstream:
  nodes:
    - name: 电子布/玻纤布
      key_players: [宏和科技, 中国巨石, 泰山玻纤]
      key_metrics:
        - 电子布价格（7628/2116/1080规格）
        - 日本设备进口瓶颈（拉丝机/织布机）
        - 电子布库存天数
      price_benchmark: "7628布涨价10-15%(2026Q1)，高端布紧缺"
      shortage_indicator: "日本设备交期延长，高端电子布产能受限"
      profit_pool: "利润池 15-20%"
      barrier: "设备垄断：日本拉丝机/织布机交期12-18个月，配方壁垒"
      bargain_power: "中等 — 高端电子布供不应求，但客户（覆铜板厂）集中度高"
    - name: 铜箔
      key_players: [铜冠铜箔, 诺德股份, 嘉元科技]
      key_metrics:
        - 锂电铜箔/电子铜箔价格
        - 铜箔加工费
        - 高端HVLP铜箔国产化率
      price_benchmark: "铜价上涨传导至铜箔，加工费稳中有升"
      profit_pool: "利润池 10-15%"
      barrier: "设备+工艺：阴极辊进口依赖，HVLP表面处理技术"
      bargain_power: "弱 — 铜价被动传导，加工费受下游挤压"
    - name: 覆铜板基材
      key_players: [生益科技, 建滔积层板, 南亚新材]
      key_metrics:
        - FR-4/高速覆铜板价格
        - 覆铜板厂商开工率
        - 订单能见度
      price_benchmark: "高速覆铜板涨价5-10%(2026Q2)，普通FR-4价格企稳"
      shortage_indicator: "高速覆铜板结构性紧缺"
      profit_pool: "利润池 15-20%"
      barrier: "配方+认证：高速CCL配方壁垒，PCB厂认证周期长"
      bargain_power: "强 — 生益+建滔占60%+，涨价可传导至PCB厂商"
    - name: 树脂/化工材料
      key_players: [东材科技, 圣泉集团]
      key_metrics:
        - 环氧树脂价格
        - 特种树脂（PPO/BT）供应
      price_benchmark: "环氧树脂价格高位震荡"
      profit_pool: "利润池 5-8%"
      barrier: "化工合成+配方：特种树脂配方壁垒"
      bargain_power: "中等 — 环氧树脂大宗属性，特种树脂有溢价"

midstream:
  nodes:
    - name: PCB制造
      key_players: [鹏鼎控股, 东山精密, 深南电路, 沪电股份, 胜宏科技]
      key_metrics:
        - 产能利用率
        - 高端PCB（HDI/IC载板/多层板）占比
        - 订单能见度
        - 交付周期
      price_benchmark: "AI服务器PCB单价提升30-50%"
      profit_pool: "利润池 20-25%"
      barrier: "规模+技术：高多层板（40层+）、HDI、IC载板，认证周期长"
      bargain_power: "中等 — 龙头集中度高，但AI服务器客户集中度高"
    - name: 载板/先进封装基板
      key_players: [兴森科技, 深南电路, 珠海越亚]
      key_metrics:
        - IC载板国产化率
        - 先进封装基板良率
        - 订单增长
      price_benchmark: "FC-BGA载板仍依赖进口，国产替代加速"
      profit_pool: "利润池 15-20%"
      barrier: "极高 — FC-BGA载板技术壁垒，海外垄断90%+"
      bargain_power: "弱 — 技术依赖进口，国产替代初期"
    - name: PCB设备/耗材
      key_players: [大族数控, 芯碁微装]
      key_metrics:
        - 钻孔机/曝光机出货量
        - 设备国产化率
      price_benchmark: "钻孔机国产替代加速"
      profit_pool: "利润池 5-8%"
      barrier: "精度+稳定性：高端钻孔机/曝光机精度要求"
      bargain_power: "中等 — 国产替代红利期，份额提升中"

downstream:
  nodes:
    - name: AI服务器/算力
      key_players: [英伟达, 华为, 浪潮, 工业富联]
      key_metrics:
        - AI服务器出货量
        - GPU/ASIC配套PCB需求
        - 单机PCB价值量
      capex_benchmark: "AI服务器PCB单机价值量$1500→$3000"
      profit_pool: "利润池 15-20%"
      barrier: "设计定义力：AI服务器架构决定PCB规格"
      bargain_power: "强（对中游）— 集中采购，但AI服务器PCB供不应求"
    - name: 智能手机
      key_players: [苹果, 华为, 小米, OPPO]
      key_metrics:
        - 高端机型出货量
        - HDI/SLP渗透率
      demand_indicator: "高端机型HDI需求稳定增长"
      profit_pool: "利润池 10-15%"
      barrier: "品牌+设计：苹果定义HDI/SLP标准"
      bargain_power: "强 — 苹果供应链话语权极强"
    - name: 汽车电子
      key_players: [特斯拉, 比亚迪, 蔚来]
      key_metrics:
        - 新能源车销量
        - 车载PCB单车价值量
      demand_indicator: "车载PCB单车价值量$60→$120+"
      profit_pool: "利润池 10-15%"
      barrier: "认证+可靠性：AEC-Q100等车规认证"
      bargain_power: "中等 — 车厂分散，但认证周期长替代慢"

value_allocation:
  upstream_share: 35
  midstream_share: 30
  downstream_share: 35
  bargaining_power: "上游覆铜板集中度高（生益+建滔占60%+），议价能力强；下游分散，但AI服务器客户集中度高"

life_cycle:
  stage: 成熟期
  penetration_range: "70-90%"
  growth_driver: "AI服务器PCB升级（高多层/高频高速）+ 车载PCB + IC载板国产替代"
  risk_factor: "消费电子需求疲软，低端PCB产能过剩"

signal_weights:
  barometric: 1.2
  mid_axis: 1.0
  ebb_warning: 0.9

key_catalysts:
  - "AI服务器出货量超预期"
  - "覆铜板涨价传导至PCB厂商"
  - "IC载板国产替代突破"
  - "高端电子布产能释放"
  - "新能源车销量数据"

preset_indicators:
  barometric:
    - indicator: 电子布价格
      unit: 元/米
      trigger: 连续3月环比上涨≥10%
      current: "高端电子布涨价10-15%"
      source: "产业调研"
    - indicator: 覆铜板价格
      unit: 元/张
      trigger: 连续2月环比上涨≥5%
      current: "高速覆铜板涨价5-10%"
      source: "产业调研"
    - indicator: 铜箔加工费
      unit: 元/吨
      trigger: 上涨≥15%
      current: "加工费稳中有升"
      source: "产业调研"
    - indicator: 覆铜板库存天数
      unit: 天
      trigger: 降至≤20天
      current: "25-30天"
      source: "产业调研"

  mid_axis:
    - indicator: PCB厂商产能利用率
      unit: '%'
      trigger: 连续2季≥85%
      current: "头部80-85%"
      source: "产业调研"
    - indicator: 高端PCB订单能见度
      unit: 月
      trigger: 延伸至3个月+
      current: "2-3个月"
      source: "产业调研"
    - indicator: PCB交付周期
      unit: 周
      trigger: 从3周延至6周+
      current: "4-5周"
      source: "产业调研"
    - indicator: AI服务器PCB毛利率
      unit: '%'
      trigger: 环比提升≥2pp
      current: "稳中有升"
      source: "财报数据"

  ebb_warning:
    - indicator: 消费电子出货量
      unit: '%'
      trigger: 同比下跌≥-10%
      current: "手机出货微增"
      source: "IDC/Canalys"
    - indicator: PCB库存周转天数
      unit: 天
      trigger: 从45天升至70天+
      current: "50-55天"
      source: "财报数据"
    - indicator: 应收账款增速
      unit: '%'
      trigger: 超过营收增速≥15pp
      current: "可控"
      source: "财报数据"

preset_companies:
  - code: "600183.SH"
    name: 生益科技
    position: "上游覆铜板"
    logic: "覆铜板龙头，高速CCL技术领先，直接受益于AI服务器PCB升级"
  - code: "002463.SZ"
    name: 沪电股份
    position: "中游PCB"
    logic: "AI服务器PCB核心供应商，高多层板技术领先"
  - code: "002916.SZ"
    name: 深南电路
    position: "中游PCB+载板"
    logic: "IC载板+PCB双轮驱动，5G/AI/车载多赛道布局"
  - code: "002384.SZ"
    name: 东山精密
    position: "中游PCB+FPC"
    logic: "FPC龙头，通过子公司索尔斯切入光模块，PCB+光通信双主线"
  - code: "300476.SZ"
    name: 胜宏科技
    position: "中游PCB"
    logic: "AI服务器高多层板供应商，弹性标的"

cross_verify:
  upstream:
    - name: 覆铜板/电子布
      metrics:
        - "高端电子布涨价: 10-15%"
        - "高速覆铜板涨价: 5-10%"
        - "开工率: 85%"
      pool: ["600183.SH"]
    - name: 铜箔/树脂
      metrics:
        - "铜价传导至铜箔加工费"
        - "环氧树脂高位震荡"
      pool: []
  midstream:
    - name: PCB制造
      metrics:
        - "AI服务器PCB单价提升: 30-50%"
        - "交付周期: 4-5周"
        - "订单能见度: 2-3个月"
      pool: ["002463.SZ", "300476.SZ"]
    - name: 载板/先进封装基板
      metrics:
        - "FC-BGA载板仍依赖进口"
        - "国产替代加速"
      pool: ["002916.SZ"]
  downstream:
    - name: AI服务器/算力设备
      metrics:
        - "AI服务器PCB单机价值量: $1500→$3000"
        - "AI GPU机柜出货: +3.8倍"
        - "800G交换机出货: +1.6倍"
      pool: ["601138.SH"]
  external_indicators:
    - name: "AI服务器PCB单机价值量"
      metric: "$1500→$3000"
      source: "产业调研"
    - name: "北美四大云厂商CAPEX"
      metric: "$7250亿，+77%"
      source: "行业预测2026"
