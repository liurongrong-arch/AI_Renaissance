chain_name: memory-storage
industry_name: 存储器/存储模组
tags: [存储, 内存, NAND, DRAM, HBM, AI算力]

upstream:
  nodes:
    - name: 存储颗粒原厂
      key_players: [三星, SK海力士, 美光, 铠侠, 长江存储, 长鑫存储]
      key_metrics:
        - DRAM/NAND合约价
        - 原厂产能利用率
        - 库存水位
        - 资本开支计划
      price_benchmark: "DRAM合约价2026Q1环比上涨8-12%，NAND涨价5-10%"
      shortage_indicator: "HBM3E产能被NVDA锁定，通用DRAM供应紧张"
    - name: HBM/先进封装
      key_players: [SK海力士, 三星, 美光, 台积电]
      key_metrics:
        - HBM3E出货量
        - 良率
        - 堆叠层数（8Hi→12Hi）
        - 单价
      price_benchmark: "HBM3E单价$200-250，供不应求"
      shortage_indicator: "HBM产能被AI芯片厂商提前锁定"
    - name: 存储控制器/接口芯片
      key_players: [Marvell, 群联, 慧荣, 澜起科技]
      key_metrics:
        - PCIe 5.0/6.0主控出货量
        - CXL控制器进展
      price_benchmark: "主控芯片价格稳定，CXL控制器新赛道"

midstream:
  nodes:
    - name: 存储模组/SSD
      key_players: [金士顿, 西部数据, 江波龙, 佰维存储]
      key_metrics:
        - SSD出货量
        - 模组价格
        - 库存周转
      price_benchmark: "企业级SSD涨价15-20%(2026Q1)"
    - name: 内存模组
      key_players: [金士顿, 芝奇, 光威, 嘉合劲威]
      key_metrics:
        - DDR5渗透率
        - 模组价格
        - 游戏/AI PC需求
      price_benchmark: "DDR5模组价格持续上涨"
    - name: 企业级存储系统
      key_players: [戴尔EMC, 惠普, 华为, 浪潮]
      key_metrics:
        - 企业级存储出货量
        - AI存储需求
      demand_indicator: "AI训练数据存储需求爆发"

downstream:
  nodes:
    - name: AI服务器/算力
      key_players: [英伟达, AMD, Google, 微软, 字节]
      key_metrics:
        - AI服务器出货量
        - 单服务器HBM容量
        - 存储带宽需求
      capex_benchmark: "AI服务器单机HBM容量80GB→192GB+"
    - name: 智能手机
      key_players: [苹果, 三星, 小米, OPPO]
      key_metrics:
        - 手机出货量
        - 单机存储容量
      demand_indicator: "旗舰机型内存升至16-24GB"
    - name: PC/笔记本
      key_players: [联想, 惠普, 戴尔, 华硕]
      key_metrics:
        - PC出货量
        - AI PC渗透率
      demand_indicator: "AI PC标配32GB+内存"
    - name: 汽车电子
      key_players: [特斯拉, 蔚来, 小鹏]
      key_metrics:
        - 车载存储需求
        - 自动驾驶数据存储
      demand_indicator: "单车存储容量128GB→1TB+"

value_allocation:
  upstream_share: 45
  midstream_share: 25
  downstream_share: 30
  bargaining_power: "上游原厂（三星/SK海力士/美光）高度集中，议价权极强；HBM环节垄断性最强"

life_cycle:
  stage: 成长期
  penetration_range: "50-70%"
  growth_driver: "AI算力驱动HBM需求井喷 + DDR5渗透率提升 + 存储涨价周期"
  risk_factor: "存储周期性强，涨价周期结束后可能面临产能过剩"

signal_weights:
  barometric: 1.3
  mid_axis: 1.1
  ebb_warning: 0.8

key_catalysts:
  - "HBM3E/4量产进度"
  - "NVDA/AMD GPU出货放量"
  - "存储原厂扩产计划"
  - "DDR5渗透率突破70%"
  - "CXL内存扩展技术商用"

preset_indicators:
  barometric:
    - indicator: DRAM合约价
      unit: USD/GB
      trigger: 连续2季环比上涨≥10%
      current: "Q1环比+8-12%"
      source: "DRAMeXchange"
    - indicator: NAND合约价
      unit: USD/GB
      trigger: 连续2季环比上涨≥8%
      current: "Q1环比+5-10%"
      source: "DRAMeXchange"
    - indicator: 原厂库存天数
      unit: 天
      trigger: 降至≤60天
      current: "60-70天"
      source: "原厂财报"
    - indicator: HBM出货量
      unit: 万颗
      trigger: 环比增长≥20%
      current: "持续高增长"
      source: "产业链调研"
    - indicator: 原厂资本开支
      unit: 亿美元
      trigger: 同比缩减≥20%
      current: "谨慎扩产"
      source: "原厂公告"

  mid_axis:
    - indicator: 模组厂毛利率
      unit: '%'
      trigger: 连续2季环比≥2pp
      current: "温和改善"
      source: "财报数据"
    - indicator: 企业级SSD订单
      unit: '%'
      trigger: 同比增长≥30%
      current: "AI驱动高增"
      source: "产业链调研"
    - indicator: 模组库存天数
      unit: 天
      trigger: 降至≤30天
      current: "35-40天"
      source: "产业调研"
    - indicator: 下游拉货力度
      unit: '%'
      trigger: 订单环比增长≥15%
      current: "平稳"
      source: "产业调研"

  ebb_warning:
    - indicator: 原厂产能利用率
      unit: '%'
      trigger: 从90%+降至75%以下
      current: "80-90%"
      source: "原厂财报"
    - indicator: 存储现货价
      unit: USD/GB
      trigger: 连续2月环比下跌
      current: "仍在上行"
      source: "DRAMeXchange"
    - indicator: 下游补库存完成度
      unit: '%'
      trigger: 渠道库存回升至健康水位以上
      current: "补库中"
      source: "产业调研"
    - indicator: 终端出货量
      unit: '%'
      trigger: 同比下跌≥-10%
      current: "手机/PC温和复苏"
      source: "IDC/Canalys"

preset_companies:
  - code: "688525.SH"
    name: 佰维存储
    position: "中游存储模组"
    logic: "国产存储模组龙头，企业级SSD+嵌入式存储双轮驱动"
  - code: "301308.SZ"
    name: 江波龙
    position: "中游存储模组"
    logic: "存储模组大厂，Lexar品牌+企业级SSD"
  - code: "688008.SH"
    name: 澜起科技
    position: "上游接口芯片"
    logic: "DDR5内存接口芯片+津逮服务器平台"
  - code: "688766.SH"
    name: 普冉股份
    position: "上游NOR Flash"
    logic: "NOR Flash国产替代，小容量存储"
  - code: "300223.SZ"
    name: 北京君正
    position: "中游存储+处理器"
    logic: "车规级存储+AIoT处理器，车载存储需求增长"
