chain_name: robotics
industry_name: 机器人产业链
source: 瑞银特斯拉Optimus分析 + 黄仁勋五层蛋糕应用层
tags: [机器人, 人形机器人, 减速器, 执行器, 具身智能]

upstream:
  nodes:
    - name: 减速器
      key_players: ["绿的谐波", "双环传动", "日本哈默纳科", "日本纳博特斯克"]
      key_metrics:
        - 谐波减速器出货量
        - RV减速器国产化率(%)
        - 微型减速器价格
      profit_pool: "减速器利润池 20-25%"
      barrier: "齿形设计+材料：谐波减速器日本垄断80%+"
      bargain_power: "日本极强，国产替代初期"
    - name: 电机/执行器
      key_players: ["三花智控", "拓普集团", "鸣志电器", "汇川技术"]
      key_metrics:
        - 伺服电机出货量
        - 力矩电机价格
        - 线性执行器送样进度
      profit_pool: "执行器利润池 15-20%"
      barrier: "定制设计：人形机器人用执行器无现成标准品"
      bargain_power: "中等 — 需重新设计，谈判周期长"
    - name: 传感器
      key_players: ["奥比中光", "禾赛科技", "速腾聚创", "柯力传感"]
      key_metrics:
        - 六维力矩传感器出货量
        - 视觉传感器分辨率
        - 激光雷达价格($)
      profit_pool: "传感器利润池 10-15%"
      barrier: "精度+集成：六维力矩传感器精度要求高"
      bargain_power: "中等 — 传感器类型分散"

midstream:
  nodes:
    - name: 机器人本体
      key_players: ["特斯拉Optimus", "Figure AI", "优必选", "宇树科技", "智元机器人"]
      key_metrics:
        - 人形机器人出货量
        - 本体成本($)
        - 量产时间表
      price_benchmark: "当前成本>$10万，目标降至$2万以下"
      profit_pool: "本体利润池 15-20%"
      barrier: "集成+量产：需整合50+零部件，量产良率爬坡"
      bargain_power: "弱 — 成本高，尚未规模化"
    - name: 控制器/大脑
      key_players: ["英伟达Isaac", "特斯拉FSD团队", "地平线", "智谱"]
      key_metrics:
        - 世界模型(World Model)进展
        - 端到端神经网络部署
        - 多模态感知融合精度
      profit_pool: "软件/算法利润池 5-10%"
      barrier: "算法成熟度：Sim-to-Real gap"
      bargain_power: "弱 — 软件容易被自研替代"
    - name: 操作系统/中间件
      key_players: ["Open Robotics", "NVIDIA Omniverse", "西门子等"]
      key_metrics:
        - ROS2使用量
        - 仿真平台使用量
        - 数字孪生部署量
      profit_pool: "平台利润池 3-5%"
      barrier: "生态：开源ROS主导，商业化难"
      bargain_power: "极弱 — 开源免费"

downstream:
  nodes:
    - name: 汽车制造
      key_players: ["特斯拉", "宝马", "比亚迪", "富士康"]
      key_metrics:
        - 汽车产线机器人密度
        - 精密装配良率
        - 质量检测覆盖率
      profit_pool: "汽车制造利润池 25-30%"
      barrier: "精度+节拍要求：汽车产线要求极高"
      bargain_power: "强 — 汽车厂是大客户"
    - name: 物流仓储
      key_players: ["极智嘉", "海康机器人", "快仓", "海柔创新"]
      key_metrics:
        - AGV/AMR出货量
        - 分拣效率(件/小时)
        - 仓储自动化渗透率
      profit_pool: "物流机器人利润池 15-20%"
      barrier: "场景复杂：需适配不同仓库布局"
      bargain_power: "中等 — 电商增速影响投入意愿"
    - name: 消费/服务
      key_players: ["优必选(Walker)", "特斯拉(Optimus)", "iRobot", "石头科技"]
      key_metrics:
        - 消费机器人销量
        - 均价($)
        - 家庭渗透率(%)
      profit_pool: "消费机器人利润池 10-15%"
      barrier: "价格敏感：需成本降至可接受范围"
      bargain_power: "弱 — C端价格敏感"

value_allocation:
  upstream_share: "30-35%"
  midstream_share: "25-30%"
  downstream_share: "35-40%"
  bargain_power: "上游减速器/执行器议价权最强(日本垄断+需重新设计)"

investment_thesis: |
  机器人是AI在物理世界的价值兑现，从"能对话"到"能办事"。
  核心矛盾：技术成熟度快速提升 vs 成本控制/量产能力的追赶。
  三层机会：
  1. 上游零部件：减速器/执行器是"卖铲人"，日本垄断但国产替代加速
  2. 中游本体：人形机器人量产在即(2026H2)，但成本需降至2万美元以下
  3. 下游应用：汽车/物流是第一批落地场景，C端家庭应用尚需时日
  关键催化剂：
  - 2026年5-6月：特斯拉Optimus定点消息
  - 2026年7-8月：量产启动
  - 2027年：成本降至可接受范围
  投资特性：上游零部件确定性最高(减速器/执行器)，中游本体弹性最大但波动也大。
  注意：当前市场可能高估了短期落地速度，需警惕"量产跳票"风险。
