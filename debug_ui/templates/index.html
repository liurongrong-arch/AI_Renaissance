<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Renaissance · Debug Console</title>
<style>
  /* ===== Reset & Variables ===== */
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg-0:#0a0e1a;--bg-1:#111827;--bg-2:#1a2234;--bg-3:#243049;
    --border:#2a3654;--border-light:#3b4f73;
    --text-1:#e8edf5;--text-2:#94a3c0;--text-3:#5b6d8a;
    --cyan:#00e5ff;--cyan-dim:#00e5ff33;--cyan-bg:#00e5ff0d;
    --green:#00e676;--green-dim:#00e67633;--green-bg:#00e6760d;
    --red:#ff5252;--red-dim:#ff525233;--red-bg:#ff52520d;
    --amber:#ffab40;--amber-dim:#ffab4033;
    --purple:#b388ff;--purple-dim:#b388ff33;
    --radius:8px;--radius-lg:12px;
    --glow-cyan:0 0 20px #00e5ff22;
    --font-mono:"SF Mono","Fira Code","JetBrains Mono",monospace;
  }
  body{font-family:-apple-system,"SF Pro Display","PingFang SC",sans-serif;background:var(--bg-0);color:var(--text-1);line-height:1.6;min-height:100vh}

  /* ===== Topbar ===== */
  .topbar{
    background:linear-gradient(180deg,var(--bg-1) 0%,var(--bg-0) 100%);
    border-bottom:1px solid var(--border);
    padding:0 32px;height:52px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
    backdrop-filter:blur(12px);
  }
  .topbar-brand{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;letter-spacing:.5px}
  .topbar-brand .dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
  .topbar-brand span{color:var(--text-3);font-weight:400;font-size:12px;margin-left:8px}
  .topbar-nav{display:flex;gap:24px}
  .topbar-nav a{font-size:12px;color:var(--text-3);text-decoration:none;font-weight:500;transition:color .15s}
  .topbar-nav a:hover,.topbar-nav a.active{color:var(--cyan)}
  .topbar-status{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--text-3)}
  .topbar-status .live{color:var(--green);font-weight:500}

  /* ===== Main Layout ===== */
  .main{max-width:1200px;margin:0 auto;padding:28px 32px 80px}

  /* ===== Control Panel ===== */
  .ctrl{
    background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);
    padding:20px 24px;margin-bottom:24px;
    display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;
  }
  .ctrl-group{display:flex;flex-direction:column;flex:1;min-width:180px}
  .ctrl-group label{font-size:11px;font-weight:500;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
  .ctrl-group select,.ctrl-group input{
    height:38px;border:1px solid var(--border);border-radius:6px;padding:0 12px;
    font-size:13px;color:var(--text-1);background:var(--bg-2);outline:none;transition:border .15s;
    font-family:inherit;
  }
  .ctrl-group textarea{
    min-height:104px;border:1px solid var(--border);border-radius:6px;padding:10px 12px;
    font-size:12px;color:var(--text-1);background:var(--bg-2);outline:none;transition:border .15s;
    font-family:var(--font-mono);resize:vertical;
  }
  .ctrl-group select:focus,.ctrl-group input:focus,.ctrl-group textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 2px var(--cyan-dim)}
  .ctrl-group select option{background:var(--bg-2);color:var(--text-1)}
  .ctrl-group .hint{margin-top:6px;font-size:11px;color:var(--text-3);line-height:1.5}
  .btn-run{
    height:38px;padding:0 28px;border:1px solid var(--cyan);border-radius:6px;
    background:var(--cyan-bg);color:var(--cyan);font-size:13px;font-weight:600;
    cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.3px;
  }
  .btn-run:hover{background:var(--cyan-dim);box-shadow:var(--glow-cyan)}
  .btn-run:disabled{opacity:.4;cursor:default;box-shadow:none}
  .btn-orch{
    height:38px;padding:0 20px;border:1px solid var(--purple);border-radius:6px;
    background:var(--purple-dim);color:var(--purple);font-size:13px;font-weight:600;
    cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .btn-orch:hover{box-shadow:0 0 20px #b388ff22}
  .btn-secondary{
    height:38px;padding:0 18px;border:1px solid var(--border-light);border-radius:6px;
    background:var(--bg-2);color:var(--text-2);font-size:13px;font-weight:600;
    cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .btn-secondary:hover{border-color:var(--cyan);color:var(--cyan)}

  /* ===== Agent Info ===== */
  .agent-info{
    display:none;padding:12px 16px;background:var(--bg-1);border:1px solid var(--border);
    border-left:3px solid var(--cyan);border-radius:0 var(--radius) var(--radius) 0;
    margin-bottom:20px;font-size:12px;color:var(--text-2);line-height:1.7;
  }

  /* ===== Error ===== */
  .error-box{
    display:none;padding:12px 16px;background:var(--red-bg);border:1px solid var(--red-dim);
    border-left:3px solid var(--red);border-radius:0 var(--radius) var(--radius) 0;
    margin-bottom:20px;font-size:12px;color:var(--red);font-family:var(--font-mono);white-space:pre-wrap;
  }

  /* ===== Loading ===== */
  .loading{display:none;text-align:center;padding:48px;color:var(--text-3);font-size:13px}
  .pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:pulse 1.2s ease-in-out infinite;margin-right:8px}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

  /* ===== Result Area ===== */
  .result-area{display:none}

  /* ===== Signal Header Bar ===== */
  .sig-bar{
    display:flex;align-items:center;gap:14px;
    padding:16px 24px;background:var(--bg-1);border:1px solid var(--border);
    border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  }
  .sig-direction{
    display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;
    font-size:13px;font-weight:600;letter-spacing:.3px;
  }
  .dir-bullish{background:var(--green-dim);color:var(--green);border:1px solid var(--green-dim)}
  .dir-bearish{background:var(--red-dim);color:var(--red);border:1px solid var(--red-dim)}
  .dir-neutral{background:var(--bg-3);color:var(--text-2);border:1px solid var(--border)}
  .sig-agent{font-size:13px;color:var(--text-2)}
  .sig-conf{margin-left:auto;font-size:28px;font-weight:700;font-family:var(--font-mono);letter-spacing:-1px}
  .sig-conf.bullish{color:var(--green)}.sig-conf.bearish{color:var(--red)}.sig-conf.neutral{color:var(--text-2)}

  /* ===== Signal Body ===== */
  .sig-body{
    background:var(--bg-1);border:1px solid var(--border);border-top:none;
    border-radius:0 0 var(--radius-lg) var(--radius-lg);padding:20px 24px;
  }
  .sig-reasoning{
    font-size:13px;color:var(--text-2);line-height:1.7;
    padding:14px 16px;background:var(--bg-2);border-radius:var(--radius);
    margin-bottom:20px;border-left:2px solid var(--cyan);
  }

  /* ===== Detail Grid ===== */
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
  .detail-cell{padding:10px 14px;background:var(--bg-2);border-radius:6px;border:1px solid var(--border)}
  .detail-lbl{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
  .detail-val{font-size:13px;color:var(--text-1);font-weight:500;word-break:break-all}

  /* ===== Signals List ===== */
  .sig-list{list-style:none;margin-bottom:20px}
  .sig-list li{padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-2);display:flex;align-items:center;gap:8px}
  .sig-list li:last-child{border-bottom:none}
  .sig-list li::before{content:"›";color:var(--cyan);font-weight:700;font-size:14px}

  /* ===== Sentiment Gauge (舆情 Agent 专用) ===== */
  .sentiment-section{margin-bottom:20px}
  .sentiment-section .sec-title{
    font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;
    letter-spacing:.8px;margin-bottom:14px;display:flex;align-items:center;gap:8px;
  }
  .sec-title::before{content:"";width:3px;height:12px;background:var(--cyan);border-radius:2px}

  .gauge-wrap{display:flex;gap:20px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
  .gauge-ring{position:relative;width:140px;height:140px;flex-shrink:0}
  .gauge-ring svg{transform:rotate(-90deg)}
  .gauge-ring .ring-bg{fill:none;stroke:var(--bg-3);stroke-width:8}
  .gauge-ring .ring-fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dasharray .6s ease}
  .gauge-ring .ring-fg.bullish{stroke:var(--green)}
  .gauge-ring .ring-fg.bearish{stroke:var(--red)}
  .gauge-ring .ring-fg.neutral{stroke:var(--text-3)}
  .gauge-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge-pct{font-size:28px;font-weight:700;font-family:var(--font-mono);letter-spacing:-1px}
  .gauge-pct.bullish{color:var(--green)}.gauge-pct.bearish{color:var(--red)}.gauge-pct.neutral{color:var(--text-2)}
  .gauge-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

  .gauge-stats{display:flex;flex-direction:column;gap:8px;flex:1;min-width:200px}
  .stat-row{display:flex;align-items:center;gap:10px;font-size:12px}
  .stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .stat-dot.bull{background:var(--green)}.stat-dot.bear{background:var(--red)}.stat-dot.neut{background:var(--text-3)}
  .stat-bar{flex:1;height:4px;background:var(--bg-3);border-radius:2px;overflow:hidden}
  .stat-bar-fill{height:100%;border-radius:2px;transition:width .4s}
  .stat-bar-fill.bull{background:var(--green)}.stat-bar-fill.bear{background:var(--red)}.stat-bar-fill.neut{background:var(--text-3)}
  .stat-num{color:var(--text-1);font-weight:600;min-width:30px;text-align:right;font-family:var(--font-mono)}

  /* ===== Emotion State Badge ===== */
  .emotion-state{
    display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;
    font-size:12px;font-weight:600;margin-bottom:16px;
  }
  .emotion-state.hot{background:var(--red-dim);color:var(--red);border:1px solid var(--red-dim)}
  .emotion-state.panic{background:var(--green-dim);color:var(--green);border:1px solid var(--green-dim)}
  .emotion-state.neutral{background:var(--bg-3);color:var(--text-2);border:1px solid var(--border)}
  .emotion-state.bullish{background:var(--green-dim);color:var(--green);border:1px solid var(--green-dim)}
  .emotion-state.bearish{background:var(--red-dim);color:var(--red);border:1px solid var(--red-dim)}

  /* ===== Dual Column (看多 vs 看空) ===== */
  .dual-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .col-card{padding:16px;border-radius:var(--radius);border:1px solid var(--border)}
  .col-card.bull{background:var(--green-bg);border-color:var(--green-dim)}
  .col-card.bear{background:var(--red-bg);border-color:var(--red-dim)}
  .col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .col-title.bull{color:var(--green)}.col-title.bear{color:var(--red)}
  .col-title .icon{font-size:14px}
  .col-items{list-style:none}
  .col-items li{padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-2)}
  .col-items li:last-child{border-bottom:none}

  /* ===== Evidence Table ===== */
  .evidence-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:20px}
  .evidence-table th{
    text-align:left;padding:8px 12px;background:var(--bg-2);color:var(--text-3);
    font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:10px;
    border-bottom:1px solid var(--border);
  }
  .evidence-table td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--text-2)}
  .evidence-table tr:hover td{background:var(--bg-2)}
  .ev-sent{font-weight:600;font-size:11px;padding:2px 8px;border-radius:10px}
  .ev-sent.bullish{background:var(--green-dim);color:var(--green)}
  .ev-sent.bearish{background:var(--red-dim);color:var(--red)}

  /* ===== Risk / Uncertainties ===== */
  .risk-section{margin-bottom:16px}
  .risk-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .risk-tag{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:500;border:1px solid}
  .risk-tag.risk{border-color:var(--amber-dim);color:var(--amber);background:var(--amber-dim)}
  .risk-tag.uncertain{border-color:var(--border);color:var(--text-3);background:var(--bg-2)}
  .risk-tag.finding{border-color:var(--cyan-dim);color:var(--cyan);background:var(--cyan-bg)}

  /* ===== Steps Chain ===== */
  .steps-chain{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
  .steps-chain .sec-title{margin-bottom:12px}
  .step-item{
    display:flex;align-items:flex-start;gap:10px;padding:10px 14px;
    background:var(--bg-2);border-radius:6px;border:1px solid var(--border);
    margin-bottom:6px;transition:border .15s;
  }
  .step-item:hover{border-color:var(--border-light)}
  .step-item.bullish{border-left:3px solid var(--green);background:var(--green-bg)}
  .step-item.bearish{border-left:3px solid var(--red);background:var(--red-bg)}
  .step-item.neutral{border-left:3px solid var(--text-3)}
  .step-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;line-height:1.4}
  .step-body{flex:1;min-width:0}
  .step-name{font-size:13px;font-weight:600;color:var(--text-1)}
  .step-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;margin-left:6px}
  .step-badge.pass{background:var(--green-dim);color:var(--green)}
  .step-badge.fail{background:var(--red-dim);color:var(--red)}
  .step-badge.warn{background:var(--amber-dim);color:var(--amber)}
  .step-badge.none{background:var(--bg-3);color:var(--text-3)}
  .step-desc{font-size:11px;color:var(--text-3);margin-top:2px}
  .step-signal{font-size:12px;color:var(--text-2);font-weight:500;margin-top:2px}
  .step-details{font-size:10px;color:var(--text-3);margin-top:4px;font-family:var(--font-mono);word-break:break-all}
  .score-line{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:10px;padding:8px 14px;background:var(--cyan-bg);border:1px solid var(--cyan-dim);
    border-radius:6px;font-size:13px;color:var(--cyan);
  }

  /* ===== Market + Stock Sections ===== */
  .market-section{
    padding:16px 20px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);
    margin-top:16px;
  }

  /* ===== Orchestrate Result ===== */
  .orch-result{margin-top:20px}
  .orch-decision{
    padding:16px 20px;background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);
    margin-bottom:16px;
  }
  .orch-decision .dec-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
  .orch-decision .dec-val{font-size:18px;font-weight:700}

  /* ===== History ===== */
  .history-panel{margin-top:24px}
  .history-item{
    display:flex;align-items:center;gap:12px;padding:10px 16px;
    border-bottom:1px solid var(--border);font-size:12px;cursor:pointer;transition:background .1s;
  }
  .history-item:hover{background:var(--bg-2)}
  .history-item:last-child{border-bottom:none}
  .h-time{color:var(--text-3);font-size:11px;min-width:60px;font-family:var(--font-mono)}
  .h-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .h-dot.bullish{background:var(--green);box-shadow:0 0 6px var(--green-dim)}
  .h-dot.bearish{background:var(--red);box-shadow:0 0 6px var(--red-dim)}
  .h-dot.neutral{background:var(--text-3)}
  .h-stock{font-weight:600;color:var(--cyan);min-width:70px;font-family:var(--font-mono)}
  .h-reason{color:var(--text-3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ===== Footer ===== */
  .footer{text-align:center;padding:32px;font-size:11px;color:var(--text-3);border-top:1px solid var(--border);margin-top:40px}

  /* ===== Responsive ===== */
  @media(max-width:768px){
    .main{padding:16px}
    .ctrl{flex-direction:column}
    .ctrl-group{min-width:100%}
    .dual-col{grid-template-columns:1fr}
    .gauge-wrap{flex-direction:column;align-items:stretch}
    .gauge-ring{margin:0 auto}
  }
</style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <span class="dot"></span>
      AI Renaissance
      <span>Debug Console</span>
    </div>
    <div class="topbar-nav">
      <a href="/" class="active">Agent Debug</a>
      <a href="/data">Data Debug</a>
    </div>
    <div class="topbar-status">
      <span class="live">● ONLINE</span>
      <span>v0.2</span>
    </div>
  </div>

<div class="main">

  <!-- Control Panel -->
  <div class="ctrl">
    <div class="ctrl-group">
      <label>Agent</label>
      <select id="agentSelect">
        <option value="">— Select Agent —</option>
      </select>
    </div>
    <div class="ctrl-group" style="max-width:180px;">
      <label>Stock Code</label>
      <input id="stockCode" type="text" placeholder="600519" />
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button class="btn-run" id="runBtn" onclick="runAgent()">▶ RUN</button>
      <button class="btn-orch" id="orchBtn" onclick="runOrchestrate()">⚡ ORCHESTRATE</button>
    </div>
  </div>

  <!-- Technical Agent 专项调试选项：仅选择「技术指标Agent」时展示 -->
  <div class="ctrl" id="technicalOptions" style="display:none;">
    <div class="ctrl-group" style="max-width:180px;">
      <label>Technical Data Mode</label>
      <select id="technicalDataMode" onchange="onTechnicalModeChange()">
        <option value="live">实时行情（推荐）</option>
        <option value="offline">离线样本</option>
        <option value="sample">自定义 OHLCV JSON</option>
      </select>
      <div class="hint">实时模式优先走 data/market_ohlcv，未配置 EASTMONEY_UT 时自动使用腾讯财经 K 线。</div>
    </div>
    <div class="ctrl-group" style="max-width:150px;">
      <label>Fusion Threshold</label>
      <input id="technicalThreshold" type="number" value="0.6" min="0" max="1" step="0.05" />
    </div>
    <div class="ctrl-group technical-live" style="max-width:150px;display:none;">
      <label>Start</label>
      <input id="technicalStart" type="date" />
    </div>
    <div class="ctrl-group technical-live" style="max-width:150px;display:none;">
      <label>End</label>
      <input id="technicalEnd" type="date" />
    </div>
    <div class="ctrl-group technical-live" style="max-width:120px;display:none;">
      <label>Freq</label>
      <select id="technicalFreq">
        <option value="D">日线</option>
        <option value="W">周线</option>
        <option value="M">月线</option>
      </select>
    </div>
    <div class="ctrl-group technical-live" style="max-width:130px;display:none;">
      <label>Adjust</label>
      <select id="technicalAdjust">
        <option value="qfq" selected>qfq（前复权）</option>
        <option value="none">none（不复权）</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0;">
      <button class="btn-secondary" onclick="fillTechnicalSampleRows()">填充样例 OHLCV</button>
    </div>
    <div class="ctrl-group technical-sample" style="min-width:100%;display:none;">
      <label>OHLCV Rows JSON</label>
      <textarea id="technicalOhlcvRows" placeholder='[{"date":"2025-01-01","open":10,"high":10.5,"low":9.8,"close":10.2,"volume":1000000}]'></textarea>
      <div class="hint">自定义模式用于验证 TechnicalAgent 的 config["ohlcv_rows"] 注入链路。</div>
    </div>
  </div>

  <!-- Agent Info -->
  <div class="agent-info" id="agentInfo"></div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <span class="pulse"></span>Agent processing...
  </div>

  <!-- Result Area -->
  <div class="result-area" id="resultArea"></div>

  <!-- History -->
  <div class="history-panel" id="historyPanel" style="display:none;">
    <div style="background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;">
      <div style="padding:14px 20px;font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border)">History</div>
      <div id="historyList"></div>
    </div>
  </div>

  <div class="footer">
    AI Renaissance · Debug → Validate → PR to develop → Review → Merge
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────
let agents = {};
let history = [];

// ── Init ─────────────────────────────────────────────
async function init() {
  try {
    const resp = await fetch("/api/agents");
    const data = await resp.json();
    const sel = document.getElementById("agentSelect");
    data.forEach(a => {
      const opt = document.createElement("option");
      opt.value = a.name;
      opt.textContent = `${a.name} · ${a.owner}`;
      opt.dataset.description = a.description || "";
      sel.appendChild(opt);
    });
    agents = data;
  } catch(e) { console.error("Failed to load agents", e); }
}

// ── Agent select change ──────────────────────────────
document.getElementById("agentSelect").addEventListener("change", function() {
  const info = document.getElementById("agentInfo");
  if (!this.value) {
    info.style.display = "none";
    updateTechnicalOptions(false);
    return;
  }
  const opt = this.options[this.selectedIndex];
  info.innerHTML = `<strong>${this.value}</strong> — ${opt.dataset.description || ""}`;
  info.style.display = "block";
  updateTechnicalOptions(this.value === "技术指标Agent");
});

// ── Technical Agent options ───────────────────────────
function updateTechnicalOptions(show) {
  document.getElementById("technicalOptions").style.display = show ? "flex" : "none";
  if (show) onTechnicalModeChange();
}

function onTechnicalModeChange() {
  const mode = document.getElementById("technicalDataMode").value;
  document.querySelectorAll(".technical-live").forEach(el => el.style.display = mode === "live" ? "flex" : "none");
  document.querySelectorAll(".technical-sample").forEach(el => el.style.display = mode === "sample" ? "flex" : "none");
}

function fillTechnicalSampleRows() {
  const rows = [];
  let prev = 20;
  for (let i = 0; i < 90; i++) {
    const close = 20 + i * 0.03 + Math.sin(i / 5) * 0.15;
    const open = prev + Math.sin(i / 6) * 0.04;
    rows.push({
      date: `2025-02-${String((i % 28) + 1).padStart(2, "0")}`,
      open: +open.toFixed(4),
      high: +(Math.max(open, close) + 0.2).toFixed(4),
      low: +(Math.min(open, close) - 0.2).toFixed(4),
      close: +close.toFixed(4),
      volume: 1000000 + i * 1000,
    });
    prev = close;
  }
  document.getElementById("technicalDataMode").value = "sample";
  onTechnicalModeChange();
  document.getElementById("technicalOhlcvRows").value = JSON.stringify(rows, null, 2);
}

function buildTechnicalPayload(stockCode) {
  const mode = document.getElementById("technicalDataMode").value;
  const payload = {
    stock_code: stockCode,
    data_mode: mode,
    fusion_threshold: parseFloat(document.getElementById("technicalThreshold").value || "0.6"),
  };
  if (mode === "live") {
    const start = document.getElementById("technicalStart").value;
    const end = document.getElementById("technicalEnd").value;
    if (start) payload.start = start;
    if (end) payload.end = end;
    payload.freq = document.getElementById("technicalFreq").value || "D";
    payload.adjust = document.getElementById("technicalAdjust").value || "qfq";
  }
  if (mode === "sample") {
    try {
      payload.ohlcv_rows = JSON.parse(document.getElementById("technicalOhlcvRows").value || "[]");
    } catch (e) {
      throw new Error("OHLCV JSON 解析失败: " + e.message);
    }
  }
  return payload;
}

// ── Run Agent ────────────────────────────────────────
async function runAgent() {
  const agentName = document.getElementById("agentSelect").value;
  const stockCode = document.getElementById("stockCode").value.trim();
  if (!agentName) { showError("Please select an Agent"); return; }
  if (!stockCode)  { showError("Please enter a stock code"); return; }

  hideError();
  document.getElementById("loading").style.display = "block";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("resultArea").innerHTML = "";
  document.getElementById("runBtn").disabled = true;

  try {
    const isTechnical = agentName === "技术指标Agent";
    const url = isTechnical ? "/api/technical_debug" : "/api/debug";
    const body = isTechnical
      ? buildTechnicalPayload(stockCode)
      : {agent_name: agentName, stock_code: stockCode};
    const resp = await fetch(url, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.error) {
      showError(data.error + (data.traceback ? "\n\n" + data.traceback : ""));
    } else {
      renderResult(data.result, agentName, stockCode);
      addHistory(data.result, agentName, stockCode);
    }
  } catch(e) {
    showError("Network error: " + e.message);
  } finally {
    document.getElementById("loading").style.display = "none";
    document.getElementById("runBtn").disabled = false;
  }
}

// ── Run Orchestrate ──────────────────────────────────
async function runOrchestrate() {
  const stockCode = document.getElementById("stockCode").value.trim();
  if (!stockCode) { showError("Please enter a stock code"); return; }

  hideError();
  document.getElementById("loading").style.display = "block";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("resultArea").innerHTML = "";
  document.getElementById("orchBtn").disabled = true;

  try {
    const resp = await fetch("/api/orchestrate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({stock_code: stockCode}),
    });
    const data = await resp.json();
    if (data.error) {
      showError(data.error + (data.traceback ? "\n\n" + data.traceback : ""));
    } else {
      renderOrchestrateResult(data.result, stockCode);
      addHistory({direction: data.result.direction, confidence: data.result.confidence, reasoning: data.result.reasoning}, "Orchestrator", stockCode);
    }
  } catch(e) {
    showError("Network error: " + e.message);
  } finally {
    document.getElementById("loading").style.display = "none";
    document.getElementById("orchBtn").disabled = false;
  }
}

// ── Render Result ────────────────────────────────────
function renderResult(sig, agentName, stockCode) {
  const dir = (sig.direction || "neutral").toLowerCase();
  const conf = sig.confidence || 0;
  const confPct = Math.round(conf * 100);
  const meta = sig.meta || {};
  const isNews = (sig.signal_type === "news" || agentName.includes("舆情"));
  const isTechnical = (sig.signal_type === "technical" || agentName.includes("技术指标"));
  const hasTriple = isNews && meta.market && meta.industry && meta.stock; // v0.3 大盘+行业+个股
  const hasDual = isNews && meta.market && meta.stock; // v0.2 大盘+个股
  let html = "";

  // === Signal Header Bar ===
  html += `
    <div class="sig-bar">
      <span class="sig-direction dir-${dir}">${dirIcon(dir)} ${dirLabel(dir)}</span>
      <span class="sig-agent">${agentName} · ${sig.signal_type || "—"}</span>
      <span class="sig-conf ${dir}">${confPct}%</span>
    </div>
    <div class="sig-body">
  `;

  // === Technical Agent: 数据起止日期置顶展示，方便校验数据与模型结果 ===
  if (isTechnical) {
    html += renderTechnicalDataPeriodBanner(meta);
  }

  // === Reasoning ===
  html += `<div class="sig-reasoning">${sig.reasoning || "No reasoning provided"}</div>`;

  // === v0.3: 大盘+行业+个股 三层展示 ===
  if (hasTriple) {
    html += renderMarketSentiment(meta.market);
    html += renderIndustrySentiment(meta.industry);
    html += renderStockSentiment(meta.stock, dir, confPct);
  } else if (hasDual) {
    html += renderMarketSentiment(meta.market);
    html += renderStockSentiment(meta.stock, dir, confPct);
  } else if (isNews && meta.bullish_count !== undefined) {
    // v0.1 兼容
    html += renderSentimentDashboard(meta, dir, confPct);
  }

  // === Signals List ===
  if (sig.signals && sig.signals.length) {
    html += `<div class="sentiment-section"><div class="sec-title">Detected Signals</div><ul class="sig-list">`;
    sig.signals.forEach(s => { html += `<li>${s}</li>`; });
    html += `</ul></div>`;
  }

  // === Technical Agent: 三段分析报告 ===
  if (isTechnical && (meta.analysis_reports || meta.reports)) {
    html += renderTechnicalReportsDashboard(sig, meta);
  } else if (isTechnical && meta.traditional_model_fusion) {
    html += renderTechnicalFusionDashboard(sig, meta);
  }

  // === Core Metrics Row ===
  const metrics = [];
  if (meta.risk_level) metrics.push(["Risk Level", meta.risk_level]);
  if (meta.time_horizon) metrics.push(["Time Horizon", meta.time_horizon]);
  if (meta.needs_human_review !== undefined) metrics.push(["Human Review", meta.needs_human_review ? "⚠ Yes" : "✓ No"]);
  metrics.push(["Stock Code", sig.stock_code || stockCode]);
  metrics.push(["Signal Type", sig.signal_type || "—"]);
  metrics.push(["Output Version", meta.output_version || "—"]);

  html += `<div class="detail-grid">`;
  metrics.forEach(([k,v]) => {
    html += `<div class="detail-cell"><div class="detail-lbl">${k}</div><div class="detail-val">${v}</div></div>`;
  });
  html += `</div>`;

  html += `</div>`; // close sig-body

  document.getElementById("resultArea").innerHTML = html;
  document.getElementById("resultArea").style.display = "block";

  // Animate gauge after render
  if (hasTriple) {
    setTimeout(() => animateTempGauge(meta.market.score), 100);
    setTimeout(() => animateIndustryGauge(meta.industry.score), 150);
  } else if (hasDual) {
    setTimeout(() => animateTempGauge(meta.market.score), 100);
  } else if (isNews && meta.bullish_count !== undefined) {
    setTimeout(() => animateGauge(confPct, dir), 100);
  }
}

// ── Technical Agent Reports Dashboard ─────────────────
function renderTechnicalDataPeriodBanner(meta) {
  const period = meta.data_period || {};
  const start = period.start || meta.analysis_start_date || "—";
  const end = period.end || meta.analysis_end_date || "—";
  const rows = period.rows_count ?? meta.rows_count ?? "—";
  if (start === "—" && end === "—" && rows === "—") return "";
  return `<div class="sentiment-section" style="border-color:var(--cyan);background:var(--cyan-dim);margin-bottom:12px">
    <div class="sec-title" style="margin-bottom:10px">🗓️ 本次模型分析数据区间</div>
    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-lbl">实际起始交易日</div><div class="detail-val">${escapeHtml(start)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">实际结束交易日</div><div class="detail-val">${escapeHtml(end)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">参与分析样本数</div><div class="detail-val">${escapeHtml(rows)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">数据源</div><div class="detail-val">${escapeHtml(meta.data_status || "—")}</div></div>
    </div>
    <div style="font-size:12px;color:var(--text-2);margin-top:8px">说明：这里展示的是实际参与模型计算的行情首尾日期，可能不同于请求的 start/end（非交易日或数据源返回范围会被过滤）。</div>
  </div>`;
}

function renderTechnicalReportsDashboard(sig, meta) {
  const reports = meta.analysis_reports || meta.reports || {};
  const order = meta.report_order || ["traditional_model_fusion", "company_evolution_analysis", "volume_price_reversal"];
  const policy = meta.technical_agent_policy || {};
  const period = meta.data_period || {};
  let html = `<div class="market-section">
    <div class="sec-title" style="font-size:15px;margin-bottom:12px">📈 技术指标Agent · 专家2组三段分析报告</div>
    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-lbl">Data Status</div><div class="detail-val">${escapeHtml(meta.data_status || "—")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Rows</div><div class="detail-val">${meta.rows_count ?? "—"}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Analysis Start</div><div class="detail-val">${escapeHtml(period.start || meta.analysis_start_date || "—")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Analysis End</div><div class="detail-val">${escapeHtml(period.end || meta.analysis_end_date || "—")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Primary Skill</div><div class="detail-val">${escapeHtml(policy.primary_skill || "traditional_model_fusion")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Report Parts</div><div class="detail-val">${Object.keys(reports).length}</div></div>
    </div>`;

  order.forEach(key => {
    if (!reports[key]) return;
    if (key === "traditional_model_fusion") html += renderTraditionalModelFusionReport(reports[key]);
    else if (key === "company_evolution_analysis") html += renderCompanyEvolutionReport(reports[key]);
    else if (key === "volume_price_reversal") html += renderVolumePriceReversalReport(reports[key]);
  });

  html += renderTechnicalTags("全局不确定性", meta.uncertainties || [], "uncertain");
  html += `</div>`;
  return html;
}

function renderTraditionalModelFusionReport(report) {
  const summary = report.summary || {};
  const json = report.json_result || {};
  const validation = (json.validation_report || report.validation_report || {});
  const period = report.data_period || {};
  const sections = report.sections || [];
  const voteSection = sections.find(s => String(s.title || "").startsWith("3.")) || {};
  const modelRows = voteSection.table || [];
  let html = `<div class="sentiment-section">
    <div class="sec-title">① 传统模型融合分析报告</div>
    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-lbl">Direction</div><div class="detail-val"><span class="ev-sent ${(summary.direction || 'neutral').toLowerCase()}">${escapeHtml(summary.direction || "neutral")}</span></div></div>
      <div class="detail-cell"><div class="detail-lbl">Confidence</div><div class="detail-val">${fmtNumber(summary.confidence, 4)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Risk</div><div class="detail-val">${escapeHtml(summary.risk_level || "—")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Total Vote</div><div class="detail-val">${fmtNumber(summary.total_vote ?? validation.total_vote, 4)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Threshold</div><div class="detail-val">${fmtNumber(summary.threshold ?? validation.final_thresholds?.threshold, 2)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Data Period</div><div class="detail-val">${escapeHtml(formatDataPeriod(period))}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Human Review</div><div class="detail-val">${summary.needs_human_review ? "⚠ Yes" : "✓ No"}</div></div>
    </div>`;

  if (modelRows.length) {
    html += `<table class="evidence-table"><thead><tr><th>模型</th><th>方向</th><th>置信</th><th>风险</th><th>有效权重</th><th>投票分</th><th>说明</th></tr></thead><tbody>`;
    html += modelRows.map(row => `<tr>
      <td>${escapeHtml(row.model_label || row.model)}</td>
      <td><span class="ev-sent ${(row.direction || 'neutral').toLowerCase()}">${escapeHtml(row.direction || "neutral")}</span></td>
      <td>${fmtNumber(row.confidence, 4)}</td>
      <td>${escapeHtml(row.risk_level || "—")}${row.needs_human_review ? ' <span class="step-badge warn">review</span>' : ''}</td>
      <td>${fmtNumber(row.effective_weight, 2)}</td>
      <td>${fmtNumber(row.vote, 4)}</td>
      <td>${escapeHtml(row.reasoning || "").slice(0, 180)}</td>
    </tr>`).join("");
    html += `</tbody></table>`;
  }

  html += renderReportSections(sections.filter(s => !String(s.title || "").startsWith("3.")), 5);
  html += renderTechnicalObjectList("门控规则", validation.gates_triggered || []);
  html += renderTechnicalObjectList("模型冲突", validation.conflicts || []);
  html += `</div>`;
  return html;
}

function renderCompanyEvolutionReport(report) {
  const summary = report.summary || {};
  const period = report.data_period || {};
  const sourceMeta = summary.data_source_meta || report.data_source_meta || {};
  let html = `<div class="sentiment-section">
    <div class="sec-title">② 公司发展分析</div>
    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-lbl">Status</div><div class="detail-val">${escapeHtml(report.status || "—")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Source</div><div class="detail-val">${escapeHtml(summary.source || sourceMeta.provider || "—")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Direction</div><div class="detail-val"><span class="ev-sent ${(summary.direction || 'neutral').toLowerCase()}">${escapeHtml(summary.direction || "neutral")}</span></div></div>
      <div class="detail-cell"><div class="detail-lbl">Confidence</div><div class="detail-val">${fmtNumber(summary.confidence, 4)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Market Data Period</div><div class="detail-val">${escapeHtml(formatDataPeriod(period))}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Disclosure Period</div><div class="detail-val">${escapeHtml(sourceMeta.since && sourceMeta.until ? `${sourceMeta.since} ~ ${sourceMeta.until}` : "—")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Announcements</div><div class="detail-val">${sourceMeta.announcements_total ?? "—"}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Needs Web Search</div><div class="detail-val">${summary.requires_web_search_for_full_report ? "⚠ Yes" : "No"}</div></div>
    </div>
    <div style="font-size:12px;color:var(--text-2);margin:8px 0 10px">${escapeHtml(summary.integrity_note || "")}</div>`;
  html += renderReportSections(report.sections || [], 8);
  html += `</div>`;
  return html;
}

function renderVolumePriceReversalReport(report) {
  const std = report.standard_json || {};
  const meta = std.meta || {};
  const md = report.markdown_summary || {};
  const metrics = md.metrics || {};
  const period = report.data_period || {};
  const rows = report.summary_table || [];
  let html = `<div class="sentiment-section">
    <div class="sec-title">③ 高盛量价背离与反转</div>`;
  if (rows.length) {
    html += `<table class="evidence-table"><thead><tr><th>标的</th><th>方向 / 置信 / 风险</th><th>触发形态</th><th>信号说明</th></tr></thead><tbody>`;
    html += rows.map(r => `<tr>
      <td>${escapeHtml(r.target || "—")}</td>
      <td><span class="ev-sent ${(r.direction || 'neutral').toLowerCase()}">${escapeHtml(r.direction || "neutral")}</span> / ${fmtNumber(r.confidence, 2)} / ${escapeHtml(r.risk_level || "—")}</td>
      <td>${escapeHtml(r.trigger_pattern || "—")}</td>
      <td>${escapeHtml(r.signal_brief || "")}</td>
    </tr>`).join("");
    html += `</tbody></table>`;
  }
  html += `<div class="detail-grid">
      <div class="detail-cell"><div class="detail-lbl">当日成交量</div><div class="detail-val">${escapeHtml(metrics.latest_volume_display || fmtNumber(metrics.latest_volume, 0))}</div></div>
      <div class="detail-cell"><div class="detail-lbl">20日均量</div><div class="detail-val">${escapeHtml(metrics.avg_volume_20_display || fmtNumber(metrics.avg_volume_20, 0))}</div></div>
      <div class="detail-cell"><div class="detail-lbl">成交量超预期（VolSurp）</div><div class="detail-val">${fmtNumber(metrics.vol_surp, 4)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">20日量比（Volume Ratio 20D）</div><div class="detail-val">${fmtNumber(metrics.volume_ratio_20, 4)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">当日涨跌幅（Day Return）</div><div class="detail-val">${fmtNumber(metrics.day_return, 4)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">成交额（元）</div><div class="detail-val">${fmtNumber(metrics.amount, 0)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">成交量口径</div><div class="detail-val">${escapeHtml(metrics.volume_unit || "—")}${metrics.volume_share_multiplier ? ` × ${fmtNumber(metrics.volume_share_multiplier, 0)}股` : ""}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Data Period</div><div class="detail-val">${escapeHtml(formatDataPeriod(period))}</div></div>
    </div>`;
  html += `<div style="font-size:12px;color:var(--text-2);margin:8px 0 10px;line-height:1.7">
      指标说明：成交量超预期（VolSurp）=（当日成交量 - 20日均量）/ 60日成交量标准差；
      20日量比 = 当日成交量 / 20日均量；
      当日涨跌幅 =（当日收盘价 - 前收盘价）/ 前收盘价。
    </div>`;
  html += renderTechnicalTags("核心信号", std.signals || [], "finding");
  html += renderTechnicalTags("关键发现 / 执行约束", meta.key_findings || [], "risk");
  html += renderTechnicalTags("不确定性", meta.uncertainties || [], "uncertain");
  if ((meta.evidence || []).length) html += renderEvidenceMiniTable(meta.evidence);
  html += `</div>`;
  return html;
}

function renderReportSections(sections, limit) {
  if (!sections || !sections.length) return "";
  return sections.slice(0, limit || sections.length).map(section => {
    const content = section.content || [];
    const items = section.items || [];
    let html = `<div class="risk-section"><div class="sec-title">${escapeHtml(section.title || "报告小节")}</div>`;
    if (content.length) html += `<ul class="sig-list">${content.map(x => `<li>${escapeHtml(x)}</li>`).join("")}</ul>`;
    else if (items.length) html += `<div class="risk-tags">${items.slice(0, 8).map(x => `<span class="risk-tag finding">${escapeHtml(formatReportSectionItem(x))}</span>`).join("")}</div>`;
    else if (section.empty_state) html += `<div style="font-size:12px;color:var(--text-3)">${escapeHtml(section.empty_state)}</div>`;
    if (section.gates_triggered) html += renderTechnicalObjectList("Gates", section.gates_triggered);
    if (section.conflicts) html += renderTechnicalObjectList("Conflicts", section.conflicts);
    html += `</div>`;
    return html;
  }).join("");
}

function formatReportSectionItem(item) {
  if (!item || typeof item !== 'object') return item || "";
  const parts = [];
  if (item.date) parts.push(item.date);
  if (item.title) parts.push(item.title);
  if (item.node_type) parts.push(`[${item.node_type}]`);
  if (item.interpretation) parts.push(item.interpretation);
  return parts.length ? parts.join(" · ") : JSON.stringify(item);
}

function renderEvidenceMiniTable(rows) {
  return `<table class="evidence-table"><thead><tr><th>Metric</th><th>Value</th><th>Comparison</th><th>Note</th></tr></thead><tbody>${rows.slice(0, 8).map(r => `<tr>
    <td>${escapeHtml(r.metric || "—")}</td>
    <td>${escapeHtml(fmtVal(r.value))}</td>
    <td>${escapeHtml(r.comparison || "")}</td>
    <td>${escapeHtml(r.note || "")}</td>
  </tr>`).join("")}</tbody></table>`;
}

// ── Technical Agent Fusion Dashboard ─────────────────
function renderTechnicalFusionDashboard(sig, meta) {
  const fusion = meta.traditional_model_fusion || {};

  const policy = meta.technical_agent_policy || {};
  const auxiliary = meta.auxiliary_signals || {};
  let html = "";

  html += `<div class="market-section">

    <div class="detail-grid">
      <div class="detail-cell"><div class="detail-lbl">Data Status</div><div class="detail-val">${escapeHtml(meta.data_status || "—")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Rows</div><div class="detail-val">${meta.rows_count ?? "—"}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Primary Skill</div><div class="detail-val">${escapeHtml(policy.primary_skill || "traditional_model_fusion")}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Aligned With run_models</div><div class="detail-val">${policy.final_signal_aligned_with_run_models ? "✓ Yes" : "—"}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Total Vote</div><div class="detail-val">${fmtNumber(validation.total_vote, 4)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Threshold</div><div class="detail-val">${fmtNumber(validation.final_thresholds?.threshold, 2)}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Gates</div><div class="detail-val">${(validation.gates_triggered || []).length}</div></div>
      <div class="detail-cell"><div class="detail-lbl">Conflicts</div><div class="detail-val">${(validation.conflicts || []).length}</div></div>
    </div>`;

  if (modelSignals.length) {
    html += `<div class="sentiment-section"><div class="sec-title">Four Model Votes</div>
      <table class="evidence-table">
        <thead><tr><th>Model</th><th>Direction</th><th>Conf</th><th>Base W</th><th>Eff W</th><th>Vote</th><th>Risk</th><th>Reasoning</th></tr></thead>
        <tbody>${modelSignals.map(row => {
          const signal = row.signal || {};
          const m = signal.meta || {};
          const direction = (signal.direction || "neutral").toLowerCase();
          return `<tr>
            <td style="font-family:var(--font-mono)">${escapeHtml(row.name || "—")}</td>
            <td><span class="ev-sent ${direction}">${escapeHtml(direction)}</span></td>
            <td style="font-family:var(--font-mono)">${fmtNumber(signal.confidence, 4)}</td>
            <td style="font-family:var(--font-mono)">${fmtNumber(row.base_weight, 2)}</td>
            <td style="font-family:var(--font-mono)">${fmtNumber(row.effective_weight, 2)}</td>
            <td style="font-family:var(--font-mono)">${fmtNumber(row.vote, 4)}</td>
            <td>${escapeHtml(m.risk_level || "—")}${m.needs_human_review ? ' <span class="step-badge warn">review</span>' : ''}</td>
            <td>${escapeHtml((signal.reasoning || "").slice(0, 180))}</td>
          </tr>`;
        }).join("")}</tbody>
      </table>
    </div>`;
  }

  const auxNames = Object.keys(auxiliary);
  if (auxNames.length) {
    html += `<div class="sentiment-section"><div class="sec-title">Auxiliary Technical Skills（仅辅助，不覆盖最终方向）</div>
      <table class="evidence-table">
        <thead><tr><th>Skill</th><th>Direction</th><th>Conf</th><th>Reasoning</th><th>Signals</th></tr></thead>
        <tbody>${auxNames.map(name => {
          const item = auxiliary[name] || {};
          const direction = (item.direction || "neutral").toLowerCase();
          return `<tr>
            <td style="font-family:var(--font-mono)">${escapeHtml(name)}</td>
            <td><span class="ev-sent ${direction}">${escapeHtml(direction)}</span></td>
            <td style="font-family:var(--font-mono)">${fmtNumber(item.confidence, 4)}</td>
            <td>${escapeHtml((item.reasoning || "").slice(0, 220))}</td>
            <td>${escapeHtml((item.signals || []).slice(0, 3).join("；"))}</td>
          </tr>`;
        }).join("")}</tbody>
      </table>
    </div>`;
  }

  html += renderTechnicalObjectList("Gates Triggered", validation.gates_triggered || []);
  html += renderTechnicalObjectList("Conflicts", validation.conflicts || []);
  html += renderTechnicalTags("Key Findings", meta.key_findings || [], "finding");
  html += renderTechnicalTags("Risk Notes", meta.risk_notes || [], "risk");
  html += renderTechnicalTags("Uncertainties", meta.uncertainties || [], "uncertain");
  html += `</div>`;
  return html;
}

function renderTechnicalObjectList(title, rows) {
  if (!rows || !rows.length) return "";
  return `<div class="risk-section"><div class="sec-title">${escapeHtml(title)}</div><div class="risk-tags">${rows.map(r => `<span class="risk-tag uncertain">${escapeHtml(JSON.stringify(r))}</span>`).join("")}</div></div>`;
}

function renderTechnicalTags(title, rows, cls) {
  if (!rows || !rows.length) return "";
  return `<div class="risk-section"><div class="sec-title">${escapeHtml(title)}</div><div class="risk-tags">${rows.map(r => `<span class="risk-tag ${cls}">${escapeHtml(r)}</span>`).join("")}</div></div>`;
}

// ── Market Sentiment (大盘温度计) ────────────
function renderMarketSentiment(market) {
  const score = market.score || 50;
  const stage = market.stage || "未知";
  const direction = market.direction || "neutral";
  const position = market.position_suggestion || "30-50%";
  const specialSignals = market.special_signals || [];
  const indicators = market.indicators || {};
  const raw = market.raw_data_summary || {};
  const uncertainties = market.uncertainties || [];

  // 温度颜色 - 跟随6阶段配色
  const PHASES = {
    "nobody_cares":       { icon: "🕳️", color: "#4a5568", label: "无人问津" },
    "secret_accumulation":{ icon: "🦉", color: "#2d3748", label: "暗度陈仓" },
    "voices_rising":      { icon: "📈", color: "#ecc94b", label: "人声渐起" },
    "climax":             { icon: "🔥", color: "#e53e3e", label: "人声鼎沸" },
    "panic_selling":      { icon: "⚡", color: "#f6ad55", label: "恐慌抛售" },
    "despair_freezing":   { icon: "🧊", color: "#63b3ed", label: "绝望冰点" },
  };

  const phaseId = market.phase || "";
  const phase = PHASES[phaseId] || null;

  let tempColor, tempBg, stageEmoji;
  if (phase) {
    tempColor = phase.color;
    tempBg = phase.color + "20";
    stageEmoji = phase.icon;
  } else {
    // 降级：纯分数映射
    tempColor = "var(--cyan)"; tempBg = "var(--cyan-dim)";
    if (score <= 20) { tempColor = "#63b3ed"; tempBg = "#63b3ed20"; }
    else if (score <= 40) { tempColor = "#4a5568"; tempBg = "#4a556820"; }
    else if (score <= 60) { tempColor = "#ecc94b"; tempBg = "#ecc94b20"; }
    else if (score <= 80) { tempColor = "#f6ad55"; tempBg = "#f6ad5520"; }
    else { tempColor = "#e53e3e"; tempBg = "#e53e3e20"; }
    stageEmoji = score <= 15 ? "🧊" : score <= 25 ? "🕳️" : score <= 40 ? "🦉" :
                 score <= 60 ? "📈" : score <= 80 ? "🔥" : "🌋";
  }

  let html = `<div class="market-section">
    <div class="sec-title" style="font-size:15px;margin-bottom:12px">📊 大盘情绪温度</div>

    <div class="gauge-wrap">
      <div class="gauge-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle class="ring-bg" cx="70" cy="70" r="58"/>
          <circle class="ring-fg" id="tempRing" cx="70" cy="70" r="58"
            stroke="${tempColor}" stroke-dasharray="0 364.42" style="transition:stroke-dasharray 1s ease"/>
        </svg>
        <div class="gauge-center">
          <div class="gauge-pct" id="tempPct" style="color:${tempColor}">0</div>
          <div class="gauge-label">TEMPERATURE</div>
        </div>
      </div>

      <div class="gauge-stats">
        <div style="font-size:18px;font-weight:600;margin-bottom:4px">${stageEmoji} ${stage}</div>
        <div style="font-size:12px;color:var(--text-3);margin-bottom:8px">
          方向 <strong style="color:${direction==='bullish'?'var(--green)':direction==='bearish'?'var(--red)':'var(--text-2)'}">${dirLabel(direction)}</strong>
          &nbsp;·&nbsp; 建议仓位 <strong style="color:var(--text-1)">${position}</strong>
        </div>
        ${specialSignals.length ? `<div style="margin-top:4px">${specialSignals.map(s =>
          `<span style="display:inline-block;padding:2px 8px;margin:2px;border-radius:4px;font-size:11px;background:var(--amber-dim);color:var(--amber)">${s}</span>`
        ).join("")}</div>` : ""}
        ${Object.keys(indicators).length ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)">
          ${Object.entries(indicators).slice(0,5).map(([k,v]) =>
            `<span style="margin-right:10px">${k}: <strong style="color:var(--text-1)">${typeof v === 'number' ? v.toFixed(1) : v}</strong></span>`
          ).join("")}
        </div>` : ""}
      </div>
    </div>

    ${raw.limit_up !== undefined ? `<div style="font-size:11px;color:var(--text-3);margin-top:8px;padding:8px 12px;background:var(--bg-3);border-radius:var(--radius)">
      涨停 <strong style="color:var(--red)">${raw.limit_up || 0}</strong> 家 ·
      跌停 <strong style="color:var(--green)">${raw.limit_down || 0}</strong> 家 ·
      上涨占比 <strong style="color:var(--text-1)">${raw.breadth != null ? (raw.breadth*100).toFixed(1)+'%' : '—'}</strong> ·
      北向 <strong style="color:var(--text-1)">${raw.north_flow != null ? (raw.north_flow>0?'+':'')+raw.north_flow.toFixed(1)+'亿' : '—'}</strong> ·
      融资变化 <strong style="color:var(--text-1)">${raw.margin_change != null ? (raw.margin_change>0?'+':'')+raw.margin_change.toFixed(1)+'%' : '—'}</strong>
    </div>` : ""}

    ${uncertainties.length ? `<div style="font-size:11px;color:var(--text-3);margin-top:4px">⚠ ${uncertainties.slice(0,2).join(' · ')}</div>` : ""}

    ${renderCommunitySection(market.community)}
  </div>`;

  return html;
}

// ── Community Discussion Section ────────────
function renderCommunitySection(community) {
  if (!community) return "";
  const vol = community.discussion_volume_score || 0;
  const bullRatio = community.bullish_ratio || 0.5;
  const bearRatio = community.bearish_ratio || 0.5;
  const trend = community.volume_trend || "stable";
  const totalPosts = community.total_posts || 0;

  const trendIcon = trend === "rising" ? "↑" : trend === "declining" ? "↓" : "→";
  const trendColor = trend === "rising" ? "var(--green)" : trend === "declining" ? "var(--red)" : "var(--text-3)";
  const trendLabel = trend === "rising" ? "升温" : trend === "declining" ? "降温" : "平稳";

  return `
  <div style="margin-top:10px;padding:10px 14px;background:var(--bg-3);border-radius:var(--radius);border:1px solid var(--border)">
    <div style="font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:.6px;margin-bottom:6px">社区讨论热度</div>
    <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:12px">
      <span>热度 <strong style="color:var(--text-1)">${vol.toFixed(0)}/100</strong></span>
      <span>帖子 <strong style="color:var(--text-1)">${totalPosts}</strong></span>
      <span>趋势 <strong style="color:${trendColor}">${trendIcon} ${trendLabel}</strong></span>
      <span>看多 <strong style="color:var(--green)">${(bullRatio*100).toFixed(0)}%</strong></span>
      <span>看空 <strong style="color:var(--red)">${(bearRatio*100).toFixed(0)}%</strong></span>
    </div>
  </div>`;
}

          ).join("")}
        </div>` : ""}
      </div>

    ${raw.breadth != null || raw.fund_flow_net != null ? `<div style="font-size:11px;color:var(--text-3);margin-top:8px;padding:8px 12px;background:var(--bg-3);border-radius:var(--radius)">

    ${uncertainties.length ? `<div style="font-size:11px;color:var(--text-3);margin-top:4px">⚠ ${uncertainties.slice(0,2).join(' · ')}</div>` : ""}

// ── Animate Industry Gauge ────────────
function animateIndustryGauge(score) {
  const ring = document.getElementById("industryRing");
  const pct = document.getElementById("industryPct");
  if (!ring || !pct) return;
  const circumference = 2 * Math.PI * 58;
  const targetDash = (score / 100) * circumference;
  setTimeout(() => {
    ring.setAttribute("stroke-dasharray", `${targetDash} ${circumference}`);
    let current = 0;
    const step = score / 30;
    const timer = setInterval(() => {
      current += step;
      if (current >= score) { current = score; clearInterval(timer); }
      pct.textContent = Math.round(current);
    }, 20);
  }, 100);
}

// ── Stock Sentiment (个股舆情) ────────────
function renderStockSentiment(stock, dir, confPct) {
  const emotionState = stock.emotion_state || "";
  const bullRatio = stock.bullish_ratio || 0.5;
  const bearRatio = 1 - bullRatio;
  const polarization = stock.polarization || 0;
  const totalPosts = stock.total_posts || 0;
  const bullCount = stock.bullish_count || 0;
  const bearCount = stock.bearish_count || 0;
  const evidence = stock.evidence || [];
  const timeRange = stock.data_time_range || "";
  const uncertainties = stock.uncertainties || [];
  const bullPct = Math.round(bullRatio * 100);
  const bearPct = Math.round(bearRatio * 100);

  let html = `<div class="market-section" style="margin-top:16px">
    <div class="sec-title" style="font-size:15px;margin-bottom:12px">📝 个股舆情分析</div>`;

  // Emotion State Badge
  if (emotionState) {
    const eClass = emotionState.includes("狂热") ? "hot" : emotionState.includes("恐慌") ? "panic" :
                   emotionState.includes("乐观") ? "bullish" :
                   emotionState.includes("悲观") ? "bearish" : "neutral";
    html += `<div class="emotion-state ${eClass}">${emotionState}</div>`;
  }

  // Stats bar
  html += `<div class="gauge-wrap">
    <div style="flex:1">
      <div class="stat-row">
        <span class="stat-dot bull"></span>
        <span style="color:var(--green);min-width:32px">看多</span>
        <div class="stat-bar"><div class="stat-bar-fill bull" style="width:${bullPct}%"></div></div>
        <span class="stat-num">${bullCount}</span>
      </div>
      <div class="stat-row">
        <span class="stat-dot bear"></span>
        <span style="color:var(--red);min-width:32px">看空</span>
        <div class="stat-bar"><div class="stat-bar-fill bear" style="width:${bearPct}%"></div></div>
        <span class="stat-num">${bearCount}</span>
      </div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)">
        极化度 <strong style="color:var(--text-1)">${(polarization*100).toFixed(1)}%</strong>
        &nbsp;·&nbsp; 总帖子 <strong style="color:var(--text-1)">${totalPosts}</strong>
        ${timeRange ? ` &nbsp;·&nbsp; ${timeRange}` : ""}
      </div>
    </div>
  </div>`;

  // Top evidence (compact)
  if (evidence.length) {
    const bullEv = evidence.filter(e => e.sentiment === "bullish");
    const bearEv = evidence.filter(e => e.sentiment === "bearish");
    html += `<div class="dual-col">`;
    html += `<div class="col-card bull">
      <div class="col-title bull"><span class="icon">📈</span> 看多评论（精选） (${bullEv.length})</div>
      <ul class="col-items">${bullEv.length ? bullEv.slice(0,3).map(e => `<li>${e.title || JSON.stringify(e)}</li>`).join("") : '<li style="color:var(--text-3)">—</li>'}</ul>
    </div>`;
    html += `<div class="col-card bear">
      <div class="col-title bear"><span class="icon">📉</span> 看空评论（精选） (${bearEv.length})</div>
      <ul class="col-items">${bearEv.length ? bearEv.slice(0,3).map(e => `<li>${e.title || JSON.stringify(e)}</li>`).join("") : '<li style="color:var(--text-3)">—</li>'}</ul>
    </div>`;
    html += `</div>`;
  }

  if (uncertainties.length) {
    html += `<div style="font-size:11px;color:var(--text-3);margin-top:4px">⚠ ${uncertainties.slice(0,2).join(' · ')}</div>`;
  }

  html += `</div>`;
  return html;
}

                   emotionState.includes("看空") || emotionState.includes("悲观") ? "bearish" : "neutral";
    html += `<div class="emotion-state ${eClass}">${emotionState}</div>`;
  }

  // Gauge + Stats
  html += `<div class="gauge-wrap">`;
  html += `<div class="gauge-ring">
    <svg width="140" height="140" viewBox="0 0 140 140">
      <circle class="ring-bg" cx="70" cy="70" r="58"/>
      <circle class="ring-fg ${dir}" id="gaugeRing" cx="70" cy="70" r="58"

    <div class="gauge-center">
      <div class="gauge-pct ${dir}" id="gaugePct">0%</div>
      <div class="gauge-label">CONFIDENCE</div>
    </div>
  </div>`;

  html += `<div class="gauge-stats">
    <div class="stat-row">
      <span class="stat-dot bull"></span>
      <span style="color:var(--green);min-width:32px">看多</span>
      <div class="stat-bar"><div class="stat-bar-fill bull" style="width:${bullPct}%"></div></div>
      <span class="stat-num">${bullCount}</span>
    </div>
    <div class="stat-row">
      <span class="stat-dot bear"></span>
      <span style="color:var(--red);min-width:32px">看空</span>
      <div class="stat-bar"><div class="stat-bar-fill bear" style="width:${bearPct}%"></div></div>
      <span class="stat-num">${bearCount}</span>
    </div>
    <div class="stat-row">
      <span class="stat-dot neut"></span>
      <span style="color:var(--text-3);min-width:32px">中性</span>
      <div class="stat-bar"><div class="stat-bar-fill neut" style="width:${Math.round(neutCount/Math.max(total,1)*100)}%"></div></div>
      <span class="stat-num">${neutCount}</span>
    </div>
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--text-3)">
      极化度 <strong style="color:var(--text-1)">${(polarization*100).toFixed(1)}%</strong>
      &nbsp;·&nbsp; 总帖子 <strong style="color:var(--text-1)">${total}</strong>
    </div>
  </div>`;
  html += `</div>`;

  // Dual Column: Evidence (看多 vs 看空)
  if (meta.evidence && meta.evidence.length) {
    const bullEv = meta.evidence.filter(e => e.sentiment === "bullish");
    const bearEv = meta.evidence.filter(e => e.sentiment === "bearish");
    html += `<div class="dual-col">`;
    html += `<div class="col-card bull">
      <div class="col-title bull"><span class="icon">📈</span> 看多评论（精选） (${bullEv.length})</div>
      <ul class="col-items">${bullEv.length ? bullEv.slice(0,3).map(e => `<li>${e.title || JSON.stringify(e)}</li>`).join("") : '<li style="color:var(--text-3)">—</li>'}</ul>
    </div>`;
    html += `<div class="col-card bear">
      <div class="col-title bear"><span class="icon">📉</span> 看空评论（精选） (${bearEv.length})</div>
      <ul class="col-items">${bearEv.length ? bearEv.slice(0,3).map(e => `<li>${e.title || JSON.stringify(e)}</li>`).join("") : '<li style="color:var(--text-3)">—</li>'}</ul>
    </div>`;
    html += `</div>`;

    // Evidence Table
    html += `<div class="sentiment-section"><div class="sec-title">Evidence Detail</div>
      <table class="evidence-table">
        <thead><tr><th>Title</th><th>Reads</th><th>Replies</th><th>Source</th><th> Sentiment</th></tr></thead>
        <tbody>${meta.evidence.map(e => `<tr>
          <td>${e.title || "—"}</td>
          <td style="font-family:var(--font-mono)">${e.reads || 0}</td>
          <td style="font-family:var(--font-mono)">${e.replies || 0}</td>
          <td>${e.source || "—"}</td>
          <td><span class="ev-sent ${e.sentiment}">${e.sentiment === "bullish" ? "看多" : "看空"}</span></td>
        </tr>`).join("")}</tbody>
      </table>
    </div>`;
  }

  // Key Findings / Risk / Uncertainties
  html += `<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px">`;
  if (meta.key_findings && meta.key_findings.length) {
    html += `<div class="risk-section" style="flex:1;min-width:200px">
      <div class="sec-title">Key Findings</div>
      <div class="risk-tags">${meta.key_findings.map(f => `<span class="risk-tag finding">${f}</span>`).join("")}</div>
    </div>`;
  }
  if (meta.risk_notes && meta.risk_notes.length) {
    html += `<div class="risk-section" style="flex:1;min-width:200px">
      <div class="sec-title">Risk Notes</div>
      <div class="risk-tags">${meta.risk_notes.map(r => `<span class="risk-tag risk">${r}</span>`).join("")}</div>
    </div>`;
  }
  if (meta.uncertainties && meta.uncertainties.length) {
    html += `<div class="risk-section" style="flex:1;min-width:200px">
      <div class="sec-title">Uncertainties</div>
      <div class="risk-tags">${meta.uncertainties.map(u => `<span class="risk-tag uncertain">${u}</span>`).join("")}</div>
    </div>`;
  }
  html += `</div>`;

  return html;
}

// ── Animate Gauge Ring ────────────────────────────────
function animateGauge(pct, dir) {
  const ring = document.getElementById("gaugeRing");
  const label = document.getElementById("gaugePct");
  if (!ring) return;
  const circumference = 2 * Math.PI * 58; // ~364.42
  const target = circumference * (pct / 100);
  let current = 0;
  const step = Math.max(1, pct / 30);
  const interval = setInterval(() => {
    current = Math.min(current + step, pct);
    const dash = circumference * (current / 100);
    ring.setAttribute("stroke-dasharray", `${dash} ${circumference}`);
    label.textContent = Math.round(current) + "%";
    if (current >= pct) clearInterval(interval);
  }, 20);
}

// ── Render Orchestrate Result ────────────────────────
function renderOrchestrateResult(result, stockCode) {
  const dir = (result.direction || "neutral").toLowerCase();
  const conf = Math.round((result.confidence || 0) * 100);
  let html = `
    <div class="sig-bar">
      <span class="sig-direction dir-${dir}">${dirIcon(dir)} ${dirLabel(dir)}</span>
      <span class="sig-agent">Orchestrator · ${stockCode}</span>
      <span class="sig-conf ${dir}">${conf}%</span>
    </div>
    <div class="sig-body">
      <div class="sig-reasoning">${result.reasoning || ""}</div>
      <div class="detail-grid">
        <div class="detail-cell"><div class="detail-lbl">Decision</div><div class="detail-val">${result.decision || "—"}</div></div>
        <div class="detail-cell"><div class="detail-lbl">Position Ratio</div><div class="detail-val">${result.position_ratio || "—"}</div></div>
        <div class="detail-cell"><div class="detail-lbl">Direction</div><div class="detail-val">${dirLabel(dir)}</div></div>
        <div class="detail-cell"><div class="detail-lbl">Confidence</div><div class="detail-val">${conf}%</div></div>
      </div>
  `;

  if (result.signals_summary) {
    html += `<div class="sentiment-section"><div class="sec-title">Signals Summary</div><ul class="sig-list">`;
    if (Array.isArray(result.signals_summary)) {
      result.signals_summary.forEach(s => { html += `<li>${s}</li>`; });
    } else {
      // Handle dict format: {total: N, bullish: N, bearish: N, neutral: N}
      const summary = result.signals_summary;
      if (summary.total !== undefined) html += `<li>Total: ${summary.total}</li>`;
      if (summary.bullish !== undefined) html += `<li>Bullish: ${summary.bullish}</li>`;
      if (summary.bearish !== undefined) html += `<li>Bearish: ${summary.bearish}</li>`;
      if (summary.neutral !== undefined) html += `<li>Neutral: ${summary.neutral}</li>`;
    }
    html += `</ul></div>`;
  }

  if (result.risks && result.risks.length) {
    html += `<div class="risk-section"><div class="sec-title">Risks</div><div class="risk-tags">`;
    result.risks.forEach(r => { html += `<span class="risk-tag risk">${r}</span>`; });
    html += `</div></div>`;
  }

  if (result.reasoning_chain && result.reasoning_chain.length) {
    html += `<div class="sentiment-section"><div class="sec-title">Reasoning Chain</div>`;
    result.reasoning_chain.forEach((step, i) => {
      html += `<div class="step-item neutral"><div class="step-icon">${i+1}</div><div class="step-body"><div class="step-name">${step}</div></div></div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById("resultArea").innerHTML = html;
  document.getElementById("resultArea").style.display = "block";
}

// ── Steps Chain ──────────────────────────────────────
function renderStepsChain(steps) {
  if (!steps || !steps.length) return "";
  let bullish = 0, bearish = 0;
  steps.forEach(s => { if (s.status==="bullish") bullish++; else if (s.status==="bearish") bearish++; });
  const statusLabel = {bullish:{text:"PASS",cls:"pass"},bearish:{text:"RISK",cls:"fail"},neutral:{text:"—",cls:"none"},warning:{text:"WARN",cls:"warn"}};
  const items = steps.map(s => {
    const lb = statusLabel[s.status] || statusLabel.neutral;
    return `<div class="step-item ${s.status}">
      <div class="step-icon">${s.icon || "·"}</div>
      <div class="step-body">
        <span class="step-name">${s.step}. ${s.name}</span>
        <span class="step-badge ${lb.cls}">${lb.text}</span>
        <div class="step-desc">${s.description || ""}</div>
        <div class="step-signal">${s.signal || ""}</div>
        ${s.details && s.details.length ? `<div class="step-details">${s.details.join("<br>")}</div>` : ""}
      </div>
    </div>`;
  }).join("");
  const net = bullish - bearish;
  const netLabel = net > 0 ? `+${net}` : `${net}`;
  const netClass = net > 0 ? "step-score-bull" : net < 0 ? "step-score-bear" : "";
  return `<div class="steps-chain">
    <div class="sec-title">Validation Chain</div>
    ${items}
    <div class="score-line">
      <span>Net Score</span>
      <span><strong>${netLabel}</strong> (Bull ${bullish} / Bear ${bearish})</span>
    </div>
  </div>`;
}

// ── History ──────────────────────────────────────────
function addHistory(sig, agentName, stockCode) {
  history.unshift({time:new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"}),sig,agentName,stockCode});
  if (history.length > 20) history.pop();
  renderHistory();
}
function renderHistory() {
  if (!history.length) return;
  document.getElementById("historyPanel").style.display = "block";
  document.getElementById("historyList").innerHTML = history.map((h,i) => {
    const dir = (h.sig.direction || "neutral").toLowerCase();
    return `<div class="history-item" onclick='rerun(${i})'>
      <span class="h-time">${h.time}</span>
      <span class="h-dot ${dir}"></span>
      <span class="h-stock">${h.stockCode}</span>
      <span class="h-reason">${h.agentName} — ${h.sig.reasoning || ""}</span>
    </div>`;
  }).join("");
}
function rerun(i) {
  const h = history[i];
  document.getElementById("stockCode").value = h.stockCode;
  // find agent in select
  const sel = document.getElementById("agentSelect");
  for (let opt of sel.options) { if (opt.value === h.agentName) { sel.value = h.agentName; break; } }
  renderResult(h.sig, h.agentName, h.stockCode);
}

// ── Helpers ──────────────────────────────────────────
function dirLabel(d) { return d==="bullish"?"BULLISH":d==="bearish"?"BEARISH":"NEUTRAL"; }
function dirIcon(d) { return d==="bullish"?"▲":d==="bearish"?"▼":"◆"; }
function escapeHtml(text) { return String(text ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;"); }
function fmtNumber(v, d) { d = d ?? 2; return v !== null && v !== undefined && !Number.isNaN(Number(v)) ? Number(v).toFixed(d) : "—"; }
function formatDataPeriod(period) {
  period = period || {};
  const start = period.start || "—";
  const end = period.end || "—";
  const rows = period.rows_count !== undefined ? ` / ${period.rows_count} rows` : "";
  return `${start} ~ ${end}${rows}`;
}
function fmtVal(v) {
  if (v === null || v === undefined) return "—";
  if (typeof v === "object") return Array.isArray(v) ? `(${v.length} items)` : JSON.stringify(v);
  return String(v);
}
function showError(msg) { const b=document.getElementById("errorBox");b.textContent=msg;b.style.display="block"; }
function hideError() { document.getElementById("errorBox").style.display="none"; }

// ── Keyboard shortcut ────────────────────────────────
document.getElementById("stockCode").addEventListener("keyup", e => { if(e.key==="Enter") runAgent(); });

// Boot
init();
</script>
